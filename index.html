/**
 * JAPAN SALARY TRACKER
 * Sistema completo de controle de jornada e salário para trabalhadores no Japão
 * 
 * Arquitetura:
 * - calcEngine.js   → Motor de cálculo centralizado (regras JP + personalizadas)
 * - storage.js      → Camada de persistência (localStorage)
 * - components/     → UI componentizada
 * 
 * Regras financeiras centralizadas em JAPAN_RULES e workerSettings
 */

// ─────────────────────────────────────────────
// MOTOR DE CÁLCULO CENTRALIZADO
// ─────────────────────────────────────────────

const JAPAN_RULES = {
  dailyHours: 8,
  weeklyHours: 40,
  monthlyOvertimeThreshold: 60, // horas extras > 60h/mês → +50%
  overtimeRate: 0.25,           // +25%
  nightRate: 0.25,              // +25% (22:00–05:00)
  holidayRate: 0.35,            // +35%
  overtimeHighRate: 0.50,       // +50% (acima de 60h extras no mês)
  nightStart: 22,               // 22:00
  nightEnd: 5,                  // 05:00
};

function parseTime(timeStr) {
  const [h, m] = timeStr.split(":").map(Number);
  return h * 60 + m;
}

function formatMinutes(mins) {
  if (mins < 0) mins = 0;
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return `${h}h${m > 0 ? String(m).padStart(2, "0") + "m" : ""}`;
}

function minutesToHours(mins) {
  return mins / 60;
}

/**
 * Calcula minutos noturnos dentro de um intervalo [start, end] em minutos absolutos
 * (pode cruzar meia-noite; start e end são relativos ao início do dia de referência)
 */
function calcNightMinutes(startMin, endMin, rules = JAPAN_RULES) {
  // Faixa noturna: 22:00 (1320) até 29:00 (1740 = 05:00 do dia seguinte)
  const nightS = rules.nightStart * 60;       // 1320
  const nightE = (24 + rules.nightEnd) * 60;  // 1740

  // Normalizar para cruzamento de meia-noite: se endMin <= startMin, adicionar 1440
  let s = startMin;
  let e = endMin <= startMin ? endMin + 1440 : endMin;

  // Calcular interseção com [nightS, nightE] e também [nightS - 1440, nightE - 1440]
  let night = 0;
  for (const offset of [0, 1440]) {
    const ns = nightS - offset;
    const ne = nightE - offset;
    const overlapS = Math.max(s, ns);
    const overlapE = Math.min(e, ne);
    if (overlapE > overlapS) night += overlapE - overlapS;
  }
  return Math.min(night, e - s);
}


// ─────────────────────────────────────────────
// MOTOR DE 有給休暇 (LSA Art.39)
// ─────────────────────────────────────────────

// Tabela legal de acúmulo por tempo de serviço (meses completos desde contratação)
const YUKYU_TABLE = [
  { monthsMin: 6,   monthsMax: 17,  days: 10 },
  { monthsMin: 18,  monthsMax: 29,  days: 11 },
  { monthsMin: 30,  monthsMax: 41,  days: 12 },
  { monthsMin: 42,  monthsMax: 53,  days: 14 },
  { monthsMin: 54,  monthsMax: 65,  days: 16 },
  { monthsMin: 66,  monthsMax: 77,  days: 18 },
  { monthsMin: 78,  monthsMax: Infinity, days: 20 },
];

function getMonthsDiff(fromDate, toDate) {
  const from = new Date(fromDate);
  const to = new Date(toDate);
  return (to.getFullYear() - from.getFullYear()) * 12 + (to.getMonth() - from.getMonth());
}

function getYukyuEntitlement(hireDate) {
  if (!hireDate) return null;
  const today = new Date();
  const hire = new Date(hireDate);
  const totalMonths = getMonthsDiff(hireDate, today);

  if (totalMonths < 6) {
    const monthsToFirst = 6 - totalMonths;
    return { eligible: false, monthsToFirst, daysTotal: 0, grants: [] };
  }

  // Calcular cada concessão recebida
  const grants = [];
  let grantDate = new Date(hire);
  grantDate.setMonth(grantDate.getMonth() + 6); // primeira concessão: 6 meses

  while (grantDate <= today) {
    const monthsAtGrant = getMonthsDiff(hireDate, grantDate);
    const row = YUKYU_TABLE.find(r => monthsAtGrant >= r.monthsMin && monthsAtGrant <= r.monthsMax);
    if (row) {
      const expiry = new Date(grantDate);
      expiry.setFullYear(expiry.getFullYear() + 2); // vence em 2 anos
      const expired = expiry < today;
      grants.push({
        date: grantDate.toISOString().slice(0, 10),
        days: row.days,
        expiry: expiry.toISOString().slice(0, 10),
        expired,
        monthsService: monthsAtGrant,
      });
    }
    // próxima concessão: +12 meses
    grantDate = new Date(grantDate);
    grantDate.setFullYear(grantDate.getFullYear() + 1);
  }

  // Próxima concessão futura
  const nextGrantDate = new Date(grantDate);
  const daysToNext = Math.ceil((nextGrantDate - today) / 86400000);

  // Saldo disponível: apenas grants não expirados (últimos 2 anos)
  const availableGrants = grants.filter(g => !g.expired);
  const daysTotal = availableGrants.reduce((a, g) => a + g.days, 0);

  // Próximo lote que vai ganhar
  const nextMonths = getMonthsDiff(hireDate, nextGrantDate);
  const nextRow = YUKYU_TABLE.find(r => nextMonths >= r.monthsMin && nextMonths <= r.monthsMax);

  // Alertas de expiração: grants que vencem nos próximos 90 dias
  const expiringAlerts = availableGrants.filter(g => {
    const exp = new Date(g.expiry);
    const daysLeft = Math.ceil((exp - today) / 86400000);
    return daysLeft <= 90 && daysLeft > 0;
  }).map(g => {
    const daysLeft = Math.ceil((new Date(g.expiry) - today) / 86400000);
    return { ...g, daysLeft };
  });

  return {
    eligible: true,
    daysTotal,
    grants,
    availableGrants,
    nextGrantDate: nextGrantDate.toISOString().slice(0, 10),
    nextGrantDays: nextRow?.days || 0,
    daysToNext,
    expiringAlerts,
    totalMonths,
    yearsService: Math.floor(totalMonths / 12),
    monthsRemainder: totalMonths % 12,
  };
}

function getYukyuUsed(entries) {
  return entries.filter(e => e.dayType === "yukyu");
}

/**
 * Motor de cálculo principal para um dia
 * Retorna breakdown detalhado
 */
function calcDay(entry, settings, monthlyOvertimeSoFar = 0) {
  const rules = settings.mode === "japan" ? JAPAN_RULES : settings.customRules;
  const hourlyRate = settings.hourlyRate || 0;

  const inMin = parseTime(entry.start);
  let outMin = parseTime(entry.end);
  if (outMin <= inMin) outMin += 1440; // cruzou meia-noite

  const breakMin = (entry.breakMinutes != null && !isNaN(entry.breakMinutes)) ? Number(entry.breakMinutes) : 0;
  const totalMin = outMin - inMin - breakMin;
  const totalHours = minutesToHours(totalMin);

  // Horas noturnas (no período trabalhado, descontando break proporcionalmente)
  const nightMin = calcNightMinutes(inMin, outMin - breakMin, rules);
  // Horas normais diárias
  const dailyLimitMin = (rules.dailyHours || 8) * 60;

  let normalMin = Math.min(totalMin, dailyLimitMin);
  let overtimeDailyMin = Math.max(0, totalMin - dailyLimitMin);

  // Tipo do dia
  const isHoliday = entry.dayType === "holiday";   // feriado estatutário → +35%
  const isSaturday = entry.dayType === "saturday"; // 6º dia → todas as horas são OT +25%
  const isSunday = entry.dayType === "sunday";     // depende de config da empresa
  const isYukyu = entry.dayType === "yukyu";       // 有給休暇 → 8h base, sem OT/noturno

  // 有給休暇: paga 8h normais independente de entrada/saída
  if (isYukyu) {
    const yukyuHours = rules.dailyHours || 8;
    const grossPay = Math.round(yukyuHours * hourlyRate);
    return {
      totalMin: yukyuHours * 60,
      totalHours: yukyuHours,
      normalMin: yukyuHours * 60,
      normalHours: yukyuHours,
      overtimeDailyMin: 0,
      overtimeHours: 0,
      nightMin: 0,
      nightHours: 0,
      isHoliday: false,
      isSaturday: false,
      isSunday: false,
      isYukyu: true,
      normalPay: grossPay,
      overtimePay: 0,
      nightPay: 0,
      holidayPay: 0,
      satSunPay: 0,
      grossPay,
      breakdown: {
        baseHours: yukyuHours,
        overtimeNormal: 0,
        overtimeHigh: 0,
        nightHours: 0,
        isYukyu: true,
        jpSaturdayIsAllOT: false,
        rates: { overtimeRate: 0, nightRate: 0, holidayRate: 0 },
      },
    };
  }

  // No modo padrão Japão: sábado = 6º dia trabalhado = ultrapassou 40h semanais
  // → TODAS as horas do sábado são hora extra (+25%), não apenas acima de 8h
  // Fonte: Labor Standards Act Art.37 + Monolith Law / ICLG Japan 2025
  const jpSaturdayIsAllOT = settings.mode === "japan" && isSaturday;

  // Adicional manual configurável (modo personalizado)
  const saturdayRate = settings.saturdayRate || 0;
  const sundayRate = settings.sundayRate || 0;

  // Acúmulo mensal de horas extras
  const prevOTHours = monthlyOvertimeSoFar;

  // Horas extras do dia: no sábado JP todas as horas contam como OT
  const thisDayOTHours = jpSaturdayIsAllOT
    ? totalHours                        // todas as horas do sábado são OT
    : minutesToHours(overtimeDailyMin); // só acima de 8h nos outros dias

  const highOTHours = Math.max(0, prevOTHours + thisDayOTHours - (rules.monthlyOvertimeThreshold || 60));
  const normalOTHours = thisDayOTHours - highOTHours;

  // Pagamento base (horas normais — no sábado JP = 0, tudo vira OT)
  const normalBaseHours = jpSaturdayIsAllOT ? 0 : minutesToHours(normalMin);
  const normalPay = normalBaseHours * hourlyRate;

  // Pagamento hora extra
  // Feriado usa holidayRate; sábado JP e dias normais usam overtimeRate
  const overtimeRate = isHoliday ? rules.holidayRate : rules.overtimeRate;
  const overtimePay =
    normalOTHours * hourlyRate * (1 + overtimeRate) +
    highOTHours * hourlyRate * (1 + (rules.overtimeHighRate || 0.5));

  // Adicional noturno (acumulativo com outros adicionais)
  const nightHours = minutesToHours(nightMin);
  const nightPay = nightHours * hourlyRate * rules.nightRate;

  // Adicional de feriado estatutário (+35% sobre TUDO)
  let holidayPay = 0;
  if (isHoliday) {
    holidayPay = totalHours * hourlyRate * rules.holidayRate;
  }

  // Sábado/domingo modo personalizado
  let satSunPay = 0;
  if (!jpSaturdayIsAllOT) {
    if (isSaturday && saturdayRate > 0) satSunPay = totalHours * hourlyRate * saturdayRate;
    if (isSunday && sundayRate > 0) satSunPay = totalHours * hourlyRate * sundayRate;
  }

  const grossPay = Math.round(normalPay + overtimePay + nightPay + holidayPay + satSunPay);

  return {
    totalMin,
    totalHours: +totalHours.toFixed(2),
    normalMin,
    normalHours: +minutesToHours(normalMin).toFixed(2),
    overtimeDailyMin,
    overtimeHours: +thisDayOTHours.toFixed(2),
    nightMin,
    nightHours: +nightHours.toFixed(2),
    isHoliday,
    isSaturday,
    isSunday,
    normalPay: Math.round(normalPay),
    overtimePay: Math.round(overtimePay),
    nightPay: Math.round(nightPay),
    holidayPay: Math.round(holidayPay),
    satSunPay: Math.round(satSunPay),
    grossPay,
    breakdown: {
      baseHours: +normalBaseHours.toFixed(2),
      overtimeNormal: +normalOTHours.toFixed(2),
      overtimeHigh: +highOTHours.toFixed(2),
      nightHours: +nightHours.toFixed(2),
      jpSaturdayIsAllOT,
      rates: { overtimeRate, nightRate: rules.nightRate, holidayRate: rules.holidayRate },
    },
  };
}

// ─────────────────────────────────────────────
// TAXAS REAIS — baseadas no holerite de Aichi-ken, Toyota-shi
// Calculadas sobre bruto tributável (sem transporte)
// Atualizado: março 2026
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// TAXAS DE DESCONTO — 愛知県トラック事業健康保険組合
// Cooperativa de Saúde do Setor de Caminhões de Aichi-ken
// Fonte: holerite real de março/2025 (Fujishouji, Toyota-shi)
// Base de cálculo: 標準報酬月額 (salário padronizado tabelado)
// Diferente da 協会けんぽ padrão — taxas específicas do setor
// ─────────────────────────────────────────────
const AICHI_RATES = {
  // 健康保険 — Cooperativa caminhões Aichi (10.5% total / 5.25% empregado)
  // Taxa real do holerite: 25,075 / 488,969 = 5.1281%
  // (diferença devida à 標準報酬月額)
  kenkouHoken: 0.051281,

  // 厚生年金 — pensão (18.3% total / 9.15% empregado)
  // Taxa real: 45,750 / 488,969 = 9.3564%
  kouseiNenkin: 0.093564,

  // 介護保険 — seguro cuidados 40+ (1.64% total / 0.82% empregado)
  // Taxa real: 3,975 / 488,969 = 0.8129%
  kaigoHoken: 0.008129,

  // 雇用保険 — seguro desemprego (0.6% empregado)
  // Taxa real: 2,760 / 488,969 = 0.5645%
  koyouHoken: 0.005645,

  shotokuZeiRate: 0.027425,
};

function estimateDeductions(grossMonthly, settings) {
  const age = settings.age || 35;
  const hasEmploymentInsurance = settings.employmentInsurance !== false;
  const hasHealthInsurance = settings.healthInsurance !== false;
  const hasPension = settings.pension !== false;
  const rates = AICHI_RATES;

  let deductions = [];

  if (hasHealthInsurance) {
    const health = Math.round(grossMonthly * rates.kenkouHoken);
    deductions.push({
      name: "健康保険 (Kenkou Hoken)",
      amount: health,
      rate: rates.kenkouHoken,
      note: `${(rates.kenkouHoken*100).toFixed(4)}% — Aichi-ken (holerite real)`
    });
  }

  if (hasPension) {
    const pension = Math.round(grossMonthly * rates.kouseiNenkin);
    deductions.push({
      name: "厚生年金 (Kousei Nenkin)",
      amount: pension,
      rate: rates.kouseiNenkin,
      note: `${(rates.kouseiNenkin*100).toFixed(4)}% — holerite real`
    });
  }

  if (age >= 40) {
    const kaigo = Math.round(grossMonthly * rates.kaigoHoken);
    deductions.push({
      name: "介護保険 (Kaigo Hoken)",
      amount: kaigo,
      rate: rates.kaigoHoken,
      note: `${(rates.kaigoHoken*100).toFixed(4)}% — aplicado aos 40+ anos`
    });
  }

  if (hasEmploymentInsurance) {
    const emp = Math.round(grossMonthly * rates.koyouHoken);
    deductions.push({
      name: "雇用保険 (Koyou Hoken)",
      amount: emp,
      rate: rates.koyouHoken,
      note: `${(rates.koyouHoken*100).toFixed(4)}% — holerite real`
    });
  }

  // Imposto de renda — cálculo progressivo simplificado (tabela 2025)
  const totalSocialSec = deductions.reduce((a, b) => a + b.amount, 0);
  const taxableIncome = grossMonthly - totalSocialSec;
  let incomeTax = 0;
  let taxNote = "";
  if (taxableIncome > 0) {
    // Tabela progressiva mensal simplificada (扶養0人)
    if (taxableIncome <= 88000) { incomeTax = 0; taxNote = "isento"; }
    else if (taxableIncome <= 162500) { incomeTax = Math.round((taxableIncome - 88000) * 0.05); taxNote = "5%"; }
    else if (taxableIncome <= 300000) { incomeTax = Math.round(3725 + (taxableIncome - 162500) * 0.10); taxNote = "10%"; }
    else if (taxableIncome <= 500000) { incomeTax = Math.round(17475 + (taxableIncome - 300000) * 0.20); taxNote = "20%"; }
    else { incomeTax = Math.round(57475 + (taxableIncome - 500000) * 0.23); taxNote = "23%"; }
  }
  const incomeTaxRate = grossMonthly > 0 ? incomeTax / grossMonthly : 0;
  deductions.push({
    name: "所得税 (Shotoku Zei)",
    amount: incomeTax,
    rate: incomeTaxRate,
    note: `faixa ${taxNote} — estimativa progressiva 2025`
  });

  if (settings.municipalTax) {
    const municipal = Math.round(grossMonthly * 0.1 / 12);
    deductions.push({
      name: "住民税 (Juumin Zei)",
      amount: municipal,
      rate: 0.1/12,
      note: "estimativa 10%/ano — Toyota-shi, Aichi"
    });
  }

  const totalDeductions = deductions.reduce((a, b) => a + b.amount, 0);
  const netPay = grossMonthly - totalDeductions;
  const totalRate = grossMonthly > 0 ? totalDeductions / grossMonthly : 0;

  return { deductions, totalDeductions, netPay, totalRate };
}

const JST_PROFILES_KEY = "jst_profiles";
const JST_ACTIVE_KEY   = "jst_active_profile";

function getStorageKeys(pid) {
  const p = `jst_p_${pid}`;
  return {
    entries:      `${p}_entries`,
    settings:     `${p}_settings`,
    payslips:     `${p}_payslips`,
    gastos:       `${p}_gastos`,
    payslipAudit: `${p}_audit`,
    carro:        `${p}_carro`,
  };
}

function migrateIfNeeded() {
  if (localStorage.getItem(JST_PROFILES_KEY)) return;
  let existingSettings = null;
  try { existingSettings = JSON.parse(localStorage.getItem("jst_settings")); } catch {}
  const profileName = existingSettings?.name || "Meu Perfil";
  const pid = "u" + Date.now().toString(36);
  const legacyMap = {
    "jst_entries":    `jst_p_${pid}_entries`,
    "jst_settings":   `jst_p_${pid}_settings`,
    "jst_gastos":     `jst_p_${pid}_gastos`,
    "jst_audit":      `jst_p_${pid}_audit`,
    "jst_carro":      `jst_p_${pid}_carro`,
    "jst_art26_tipo": `jst_p_${pid}_art26_tipo`,
    "jst_art26_reg":  `jst_p_${pid}_art26_reg`,
    "jst_art26_pct":  `jst_p_${pid}_art26_pct`,
  };
  Object.entries(legacyMap).forEach(([oldKey, newKey]) => {
    const val = localStorage.getItem(oldKey);
    if (val !== null) localStorage.setItem(newKey, val);
  });
  localStorage.setItem(JST_PROFILES_KEY, JSON.stringify([{ id: pid, name: profileName, color: "#f59e0b" }]));
  localStorage.setItem(JST_ACTIVE_KEY, pid);
}

function loadData(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}

function saveData(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

// ─── Badge ───
function Badge({ color, children }) {
  const colors = {
    red: "bg-red-900/40 text-red-300 border-red-800/50",
    yellow: "bg-yellow-900/40 text-yellow-300 border-yellow-800/50",
    blue: "bg-blue-900/40 text-blue-300 border-blue-800/50",
    green: "bg-green-900/40 text-green-300 border-green-800/50",
    gray: "bg-zinc-800 text-zinc-400 border-zinc-700",

  return (
    <span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-medium border ${colors[color] || colors.gray}`}>

}

// ─── Input ───

        <div className="flex gap-3 px-4 pb-4">
          <button

          >
            Cancelar
          </button>
          <button
            onClick={() => onSave({ ...form, id: initial?.id || Date.now().toString() })}

          >
            Salvar
          </button>
        </div>
      </div>
    </div>
  );
}

function CalcDetailModal({ entry, settings, onClose }) {
  const calc = calcDay(entry, settings);

  const rows = [
    calc.breakdown?.isYukyu
      ? { label: "有給休暇", value: "8h remuneradas", note: "folga remunerada — salário base × 8h, sem hora extra ou noturno" }
      : { label: "Horas trabalhadas (líquido)", value: formatMinutes(calc.totalMin), note: `entrada ${entry.start} → saída ${entry.end}, break ${entry.breakMinutes}min` },
    { label: "Horas normais", value: calc.breakdown.jpSaturdayIsAllOT ? "0h (sábado)" : formatMinutes(calc.normalMin), note: calc.breakdown.jpSaturdayIsAllOT ? "sábado JP: todas as horas são hora extra" : `até ${settings.mode === "japan" ? "8h" : settings.customRules?.dailyHours + "h"} diárias` },
    { label: "Horas extras", value: formatMinutes(Math.round(calc.breakdown.overtimeNormal * 60 + calc.breakdown.overtimeHigh * 60)), note: calc.breakdown.jpSaturdayIsAllOT ? "6º dia → +25% em todas as horas (LSA Art.37)" : "acima do limite diário" },
    { label: "Horas noturnas (22h–05h)", value: formatMinutes(calc.nightMin), note: "+25% adicional noturno" },
    calc.isHoliday && { label: "Horas em feriado", value: formatMinutes(calc.totalMin), note: "+35% adicional feriado" },
    { label: "—", value: "", note: "" },
    { label: "Pagamento base", value: YEN(calc.normalPay), note: `${calc.normalHours}h × ¥${settings.hourlyRate}` },
    { label: "Pagamento hora extra", value: YEN(calc.overtimePay), note: `+${(calc.breakdown.rates.overtimeRate * 100).toFixed(0)}%` },
    { label: "Adicional noturno", value: YEN(calc.nightPay), note: `+${(calc.breakdown.rates.nightRate * 100).toFixed(0)}%` },
    calc.holidayPay > 0 && { label: "Adicional feriado", value: YEN(calc.holidayPay), note: `+${(calc.breakdown.rates.holidayRate * 100).toFixed(0)}%` },
    calc.satSunPay > 0 && { label: "Adicional sáb/dom", value: YEN(calc.satSunPay), note: "" },
    { label: "—", value: "", note: "" },
    { label: "BRUTO DO DIA", value: YEN(calc.grossPay), note: "", bold: true },
  ].filter(Boolean);

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4" style={{ background: "rgba(0,0,0,0.75)" }}>
      <div className="w-full max-w-lg bg-zinc-950 border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden">
        <div className="flex items-center justify-between px-5 py-4 border-b border-zinc-800">
          <h2 className="text-base font-semibold text-zinc-100">Detalhamento do Cálculo</h2>
          <button onClick={onClose} className="text-zinc-500 hover:text-zinc-200 transition-colors text-xl">×</button>
        </div>
        <div className="p-4 space-y-0.5 max-h-80 overflow-y-auto">
          {rows.map((r, i) =>
            r.label === "—" ? (
              <div key={i} className="border-t border-zinc-800 my-2" />
            ) : (
              <div key={i} className={`flex justify-between items-start py-1.5 ${r.bold ? "text-amber-400 font-bold" : ""}`}>
                <div>
                  <div className={`text-sm ${r.bold ? "text-amber-400" : "text-zinc-300"}`}>{r.label}</div>
                  {r.note && <div className="text-xs text-zinc-600">{r.note}</div>}

          )}

          <button onClick={onClose} className="w-full py-2.5 rounded-xl bg-amber-500 hover:bg-amber-400 text-black font-semibold text-sm transition-colors">

  );
}

function TeateSection({ teate = [], onChange }) {
  function update(id, field, value) {
    onChange(teate.map(t => t.id === id ? { ...t, [field]: value } : t));
  }
  function add() {
    const newT = {
      id: "t" + Date.now(),
      name: "新手当",
      label: "Novo benefício",
      amount: 0,
      taxable: true,
      active: true,
    };
    onChange([...teate, newT]);
  }
  function remove(id) {
    onChange(teate.filter(t => t.id !== id));
  }

  const totalActive = teate.filter(t => t.active).reduce((a, t) => a + (t.amount || 0), 0);
  const totalNonTaxable = teate.filter(t => t.active && !t.taxable).reduce((a, t) => a + (t.amount || 0), 0);
  const totalTaxable = teate.filter(t => t.active && t.taxable).reduce((a, t) => a + (t.amount || 0), 0);

  return (
    <div className="space-y-2">
      {teate.map(t => (
        <div key={t.id} className={`border rounded-xl p-3 space-y-2 transition-all ${t.active ? "border-zinc-700 bg-zinc-900/50" : "border-zinc-800 bg-zinc-900/20 opacity-50"}`}>
          <div className="flex items-center gap-2">
            <div
              onClick={() => update(t.id, "active", !t.active)}
              className={`w-8 h-4 rounded-full transition-colors cursor-pointer shrink-0 ${t.active ? "bg-amber-500" : "bg-zinc-700"}`}
            >
              <div className={`w-3 h-3 bg-white rounded-full m-0.5 transition-transform ${t.active ? "translate-x-4" : ""}`} />
            </div>
            <input
              value={t.label}
              onChange={e => update(t.id, "label", e.target.value)}
              className="flex-1 bg-transparent text-sm font-medium text-zinc-200 focus:outline-none"
              placeholder="Nome do benefício"
            />
            <button onClick={() => remove(t.id)} className="text-zinc-600 hover:text-red-400 text-xs transition-colors">✕</button>
          </div>
          <div className="flex gap-2 items-center">
            <input
              value={t.name}
              onChange={e => update(t.id, "name", e.target.value)}
              className="flex-1 min-w-0 bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1.5 text-xs text-zinc-400 focus:outline-none focus:border-amber-500 transition-all"
              placeholder="Nome em japonês (opcional)"
            />
            <div className="flex gap-2 items-center shrink-0">
              <div className="relative flex items-center">
                <span className="absolute left-2 text-xs text-zinc-500">¥</span>
                <input
                  type="number"
                  min="0"
                  value={t.amount || ""}
                  onChange={e => update(t.id, "amount", parseInt(e.target.value)||0)}
                  className="w-24 bg-zinc-800 border border-zinc-700 rounded-lg pl-5 pr-2 py-1.5 text-xs text-zinc-200 font-mono focus:outline-none focus:border-amber-500 transition-all"
                />
              </div>
              <button
                onClick={() => update(t.id, "taxable", !t.taxable)}
                className={`text-xs px-2 py-1.5 rounded-lg border transition-all whitespace-nowrap ${t.taxable ? "border-orange-700/50 text-orange-400 bg-orange-900/20" : "border-blue-700/50 text-blue-400 bg-blue-900/20"}`}
              >
                {t.taxable ? "trib." : "n/trib."}
              </button>
            </div>
          </div>
        </div>
      ))}

      <button
        onClick={add}
        className="w-full py-2 rounded-xl border border-dashed border-zinc-700 text-xs text-zinc-500 hover:text-zinc-300 hover:border-zinc-500 transition-all"
      >
        + Adicionar benefício
      </button>

      {teate.some(t => t.active) && (
        <div className="bg-zinc-800/50 rounded-xl p-2.5 space-y-1">
          <div className="flex justify-between text-xs">
            <span className="text-zinc-500">Tributáveis</span>
            <span className="font-mono text-orange-400">{YEN(totalTaxable)}</span>

// ─────────────────────────────────────────────
// DETECÇÃO DE CONFLITO DE HORÁRIOS
// ─────────────────────────────────────────────

function getEntryMinutes(entry) {
  // Returns [startMin, endMin] in absolute minutes, handling midnight crossing
  const startMin = parseTime(entry.start);
  let endMin = parseTime(entry.end);
  if (endMin <= startMin) endMin += 1440; // cruzou meia-noite
  return [startMin, endMin];
}

function checkConflict(newEntry, existingEntries, editingId = null) {
  // Returns conflict object or null
  if (newEntry.dayType === "yukyu") return null; // 有給 não tem horário

  const [newStart, newEnd] = getEntryMinutes(newEntry);
  const newDate = newEntry.date;

  for (const existing of existingEntries) {
    if (existing.id === editingId) continue; // pular o próprio ao editar
    if (existing.dayType === "yukyu") continue;

    // Verificar sobreposição considerando que o turno pode cruzar a meia-noite
    // O turno existente pode estar no dia anterior e cruzar para newDate
    const candidateDates = [existing.date];
    // Se turno existente cruza meia-noite, também afeta o dia seguinte
    const [exStart, exEnd] = getEntryMinutes(existing);
    const existingCrossesM = parseTime(existing.end) <= parseTime(existing.start);

    // Calcular dias relevantes
    const newDateObj = new Date(newDate + "T12:00:00");
    const existingDateObj = new Date(existing.date + "T12:00:00");
    const diffDays = Math.round((newDateObj - existingDateObj) / 86400000);

    let overlap = false;

    if (diffDays === 0) {
      // Mesmo dia: verificar sobreposição direta
      // newStart..newEnd vs exStart..exEnd
      overlap = newStart < exEnd && newEnd > exStart;
    } else if (diffDays === 1 && existingCrossesM) {
      // Turno existente começa dia anterior e cruza meia-noite
      // Ajustar exEnd para base do dia seguinte (newDate)
      const exEndAdjusted = exEnd - 1440; // horas após meia-noite = horas do dia atual
      overlap = newStart < exEndAdjusted && newEnd > 0 && newStart < exEndAdjusted;
      overlap = newStart < exEndAdjusted; // novo turno começa antes do anterior terminar
    } else if (diffDays === -1) {
      // Novo turno começa dia anterior e cruza meia-noite para o dia do existente
      const newEndAdjusted = newEnd - 1440;
      overlap = newEndAdjusted > exStart;
    }

    if (overlap) {
      return {
        existingEntry: existing,
        message: `Conflito com turno de ${existing.date === newDate ? "mesmo dia" : existing.date} (${existing.start}–${existing.end})`,
      };
    }
  }
  return null;
}

              {calc.overtimeHours > 0 && (

              >
                Excluir

            </div>

function ReportsScreen({ entries, settings }) {
  const [month, setMonth] = useState(new Date().toISOString().slice(0, 7));
  const [showDetails, setShowDetails] = useState(false);

  const monthEntries = entries.filter((e) => e.date.startsWith(month)).sort((a, b) => a.date.localeCompare(b.date));

  let accOTHours = 0;
  const calcs = monthEntries.map((entry) => {
    const c = calcDay(entry, settings, accOTHours);
    accOTHours += c.overtimeHours;
    return c;
  });

  const totals = calcs.reduce(
    (acc, c) => ({
      totalHours: acc.totalHours + c.totalHours,
      normalHours: acc.normalHours + c.normalHours,
      overtimeHours: acc.overtimeHours + c.overtimeHours,
      nightHours: acc.nightHours + c.nightHours,
      grossPay: acc.grossPay + c.grossPay,
    }),
    { totalHours: 0, normalHours: 0, overtimeHours: 0, nightHours: 0, grossPay: 0 }
  );

  const teate = settings.teate || [];
  const activeTeate = teate.filter(t => t.active && t.amount > 0);
  const totalTeate = activeTeate.reduce((a, t) => a + t.amount, 0);
  const totalNonTax = activeTeate.filter(t => !t.taxable).reduce((a, t) => a + t.amount, 0);
  const grossWithTeate = totals.grossPay + totalTeate;
  const deductionInfo = estimateDeductions(grossWithTeate, settings);
  const netPay = deductionInfo.netPay;

  const yukyuEntries = monthEntries.filter(e => e.dayType === "yukyu");

  function exportCSV() {
    const header = "Data,Entrada,Saída,Break,Horas Total,Horas Normais,HE,Horas Noturnas,Bruto\n";
    const rows = monthEntries.map((e, i) => {
      const c = calcs[i];
      return `${e.date},${e.start},${e.end},${e.breakMinutes},${c.totalHours},${c.normalHours},${c.overtimeHours},${c.nightHours},${c.grossPay}`;
    });
    const csv = header + rows.join("\n");
    const uri = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    const a = document.createElement("a"); a.href = uri; a.download = `jornada-${month}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  const monthLabel = new Date(month + "-01").toLocaleDateString("pt-BR", { month: "long", year: "numeric" });

  // Weekly summary
  const weekMap = {};
  monthEntries.forEach((entry, i) => {
    const d = new Date(entry.date + "T12:00:00");
    const weekNum = Math.ceil(d.getDate() / 7);
    if (!weekMap[weekNum]) weekMap[weekNum] = { entries: [], calcs: [] };
    weekMap[weekNum].entries.push(entry);
    weekMap[weekNum].calcs.push(calcs[i]);
  });

  if (monthEntries.length === 0) {
    return (
      <div className="space-y-3 pb-24 sm:pb-28">
        <div className="flex items-center gap-3 pt-1">
          <MonthPicker value={month} onChange={setMonth} />
        </div>
        <Card className="text-center py-12">
          <div className="text-4xl mb-2">📊</div>
          <div className="text-sm" style={{color:"var(--text-muted)"}}>Sem dados para {monthLabel}</div>
        </Card>
      </div>
    );
  }

  return (
    <div className="space-y-3 pb-24 sm:pb-28">
      {/* Month selector + CSV */}
      <div className="flex items-center gap-3 pt-1">
        <MonthPicker value={month} onChange={setMonth} />
        <button onClick={exportCSV}
          className="text-xs px-3 py-2 border rounded-lg transition-colors"
          style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>↓ CSV</button>
      </div>

      {/* ── RESULTADO FINANCEIRO — destaque principal ── */}
      <Card>
        <div className="text-xs font-semibold text-amber-400 uppercase tracking-widest mb-3 capitalize">{monthLabel}</div>

        {/* Linha principal: Bruto → Descontos → Líquido */}
        <div className="flex items-center justify-between mb-3">
          <div className="text-center">
            <div className="text-xs mb-1" style={{color:"var(--text-muted)"}}>Bruto total</div>
            <div className="text-lg font-bold font-mono text-green-400">{YEN(grossWithTeate)}</div>
            {totalTeate > 0 && <div className="text-xs" style={{color:"var(--text-muted)"}}>incl. {YEN(totalTeate)} teate</div>}
          </div>
          <div className="text-xl" style={{color:"var(--text-muted)"}}>→</div>
          <div className="text-center">
            <div className="text-xs mb-1 text-red-400">Descontos</div>

        {/* Barra visual bruto → líquido */}
        <div className="w-full h-3 bg-zinc-800 rounded-full overflow-hidden">
          <div className="h-3 bg-amber-500 rounded-full transition-all"

        {/* Próxima concessão */}

              <div className="text-right">

        {/* Lista de utilizados */}

                      {e.note && <div className="text-xs text-zinc-600 italic">{e.note}</div>}

                    <div className="text-xs font-medium text-green-400">{YEN(8 * settings.hourlyRate)}</div>

function Art26Card({ month, storagePrefix }) {
  const TIPO_KEY = storagePrefix + "_art26_tipo";
  const REG_KEY  = storagePrefix + "_art26_reg";
  const PCT_KEY  = storagePrefix + "_art26_pct";

  const [tipo, setTipoState] = React.useState(() => localStorage.getItem(TIPO_KEY) || "mensalista");
  const [registros, setRegistros] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(REG_KEY)) || []; }
    catch { return []; }
  });
  const [pct, setPctState] = React.useState(() => parseInt(localStorage.getItem(PCT_KEY)) || 60);
  const [showModal, setShowModal] = React.useState(false);

  const [formKey, setFormKey] = React.useState(() => {
    const [y, m] = month.split("-").map(Number);
    let pm = m - 1, py = y;
    if (pm <= 0) { pm += 12; py -= 1; }
    return `${py}-${String(pm).padStart(2, "0")}`;
  });
  const [formBruto, setFormBruto] = React.useState("");
  const [formDias, setFormDias] = React.useState("");

  function setTipo(v) { setTipoState(v); localStorage.setItem(TIPO_KEY, v); }
  function setPct(v) { setPctState(v); localStorage.setItem(PCT_KEY, String(v)); }

  function lancar() {
    if (!formKey || !formBruto) return;
    const bruto = parseInt(formBruto);
    if (!bruto) return;
    const [fy, fm] = formKey.split("-").map(Number);
    const calDays = new Date(fy, fm, 0).getDate();
    const label = new Date(fy, fm - 1, 1).toLocaleDateString("pt-BR", { month: "long", year: "2-digit" });
    const diasTrabVal = tipo === "horista" ? (parseInt(formDias) || 0) : 0;
    const rec = { key: formKey, label, bruto, diasTrab: diasTrabVal, diasCal: calDays };
    const exists = registros.findIndex(r => r.key === formKey);
    let newRegs = exists >= 0 ? registros.map((r, i) => i === exists ? rec : r) : [...registros, rec];
    newRegs.sort((a, b) => b.key.localeCompare(a.key));
    setRegistros(newRegs);
    localStorage.setItem(REG_KEY, JSON.stringify(newRegs));
    setFormBruto("");
    setFormDias("");
    setShowModal(false);
  }

  function remover(key) {
    const newRegs = registros.filter(r => r.key !== key);
    setRegistros(newRegs);
    localStorage.setItem(REG_KEY, JSON.stringify(newRegs));
  }

  // 3 registros mais recentes antes do mês atual
  const regsEmUso = registros.filter(r => r.key < month).slice(0, 3);

  // Cálculo Art. 12 — 平均賃金
  let totalBruto = 0, totalCal = 0, totalTrab = 0;
  regsEmUso.forEach(r => { totalBruto += r.bruto; totalCal += r.diasCal; totalTrab += r.diasTrab; });

  const avgCal  = totalCal > 0 && totalBruto > 0 ? totalBruto / totalCal : null;
  const avgTrab = tipo === "horista" && totalTrab > 0 && totalBruto > 0 ? (totalBruto / totalTrab) * 0.6 : null;
  const avgDay  = avgCal !== null ? (avgTrab !== null ? Math.max(avgCal, avgTrab) : avgCal) : null;

  const PCTS = [60, 70, 80];

  // Preencher até 3 linhas para layout consistente
  const linhas = [...regsEmUso];
  while (linhas.length < 3) linhas.push(null);

  return (
    <Card className="space-y-3">
      {/* Header */}
      <div className="flex items-center gap-1.5 text-zinc-500 text-xs">
        <span>⏸️</span>
        <span className="uppercase tracking-widest font-medium">Art. 26 LSA · 休業手当</span>
      </div>

      {/* Meses + resultado lado a lado */}
      <div className="flex gap-2 items-stretch">
        {/* 3 linhas de meses */}
        <div className="flex-1 flex flex-col gap-1.5">
          {linhas.map((r, i) => r ? (
            <div key={r.key} className="flex-1 flex flex-col justify-center bg-zinc-900/80 border border-zinc-800 rounded-xl px-2.5 py-2 min-h-[3rem]">
              <div className="text-xs font-medium capitalize text-zinc-300 leading-tight">{r.label}</div>
              <div className="flex items-center gap-1.5 mt-0.5">
                <span className="text-xs font-mono text-zinc-400">{YEN(r.bruto)}</span>
                <span className="text-zinc-600 text-xs">{r.diasCal}d{tipo === "horista" && r.diasTrab ? ` · ${r.diasTrab}t` : ""}</span>
              </div>
            </div>
          ) : (
            <div key={i} className="flex-1 flex items-center justify-center bg-zinc-900/40 border border-dashed border-zinc-800 rounded-xl min-h-[3rem]">
              <span className="text-zinc-700 text-xs">—</span>
            </div>
          ))}
        </div>

        {/* Resultado */}
        <div className={`w-28 flex flex-col items-center justify-center rounded-xl px-2 py-3 text-center ${avgDay ? "bg-green-950/40 border border-green-900/50" : "bg-zinc-900/80 border border-zinc-800"}`}>
          {avgDay ? (
            <>
              <div className="text-zinc-500 text-xs uppercase tracking-widest leading-tight">dia parado</div>
              <div className="text-lg font-bold font-mono text-green-400 mt-1 leading-tight">
                {YEN(Math.round(avgDay * pct / 100))}
              </div>
              <div className="text-green-600 text-xs mt-0.5">{pct}%</div>
              <div className="text-zinc-600 text-xs mt-2 leading-tight">
                平均賃金<br/>{YEN(Math.round(avgDay))}
              </div>
            </>
          ) : (
            <span className="text-zinc-700 text-xs leading-snug text-center">lance os 3 meses anteriores</span>
          )}
        </div>
      </div>

      {/* Chips de percentual */}
      <div className="flex gap-1.5">
        {PCTS.map(p => (
          <button key={p} onClick={() => setPct(p)}
            className={`flex-1 py-1.5 rounded-lg text-xs font-semibold border transition-colors ${
              pct === p
                ? "bg-green-500/20 border-green-700/60 text-green-400"
                : "bg-zinc-900/80 border-zinc-800 text-zinc-500 hover:text-zinc-300"
            }`}>
            {p}%
          </button>
        ))}
      </div>

      {/* Botão de lançamento */}
      <button onClick={() => setShowModal(true)}
        className="w-full py-2.5 rounded-xl bg-amber-500 hover:bg-amber-400 text-black text-xs font-semibold transition-colors">
        + Lançar salário
      </button>

      {/* Modal */}
      {showModal && (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4"
          style={{background:"rgba(0,0,0,0.75)"}} onClick={e => { if (e.target === e.currentTarget) setShowModal(false); }}>
          <div className="w-full max-w-md bg-zinc-950 border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden">
            <div className="flex items-center justify-between px-5 py-4 border-b border-zinc-800">
              <div>
                <div className="text-sm font-semibold text-zinc-100">Lançar · Art. 26</div>
                <div className="text-xs text-zinc-500">Salário bruto recebido no mês</div>
              </div>
              <button onClick={() => setShowModal(false)} className="text-zinc-500 hover:text-zinc-200 text-xl">×</button>
            </div>

            <div className="p-4 space-y-3">
              {/* Tipo */}
              <div className="flex rounded-lg overflow-hidden border border-zinc-800">
                {["mensalista","horista"].map(t => (
                  <button key={t} onClick={() => setTipo(t)}
                    className={`flex-1 py-2 text-xs font-semibold transition-colors ${
                      tipo === t ? "bg-zinc-100 text-zinc-900" : "bg-zinc-900 text-zinc-400 hover:text-zinc-200"
                    }`}>
                    {t.charAt(0).toUpperCase() + t.slice(1)}
                  </button>
                ))}
              </div>

              {/* Mês */}
              <div>
                <div className="text-xs text-zinc-500 mb-1 uppercase tracking-wide">Mês de referência</div>
                <input type="month" value={formKey} onChange={e => setFormKey(e.target.value)}
                  className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-amber-500 transition-all"
                />
              </div>

              {/* Bruto */}
              <div>
                <div className="text-xs text-zinc-500 mb-1 uppercase tracking-wide">Salário bruto (¥)</div>
                <input type="number" min="0" value={formBruto} onChange={e => setFormBruto(e.target.value)}
                  placeholder="0"
                  className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm font-mono text-right text-zinc-100 focus:outline-none focus:border-amber-500 transition-all"
                />
              </div>

              {/* Dias trabalhados (horista) */}
              {tipo === "horista" && (
                <div>
                  <div className="text-xs text-zinc-500 mb-1 uppercase tracking-wide">Dias trabalhados no mês</div>
                  <input type="number" min="0" value={formDias} onChange={e => setFormDias(e.target.value)}
                    placeholder="0"
                    className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm font-mono text-right text-zinc-100 focus:outline-none focus:border-amber-500 transition-all"
                  />
                </div>
              )}

              {/* Confirmar */}
              <button onClick={lancar} disabled={!formBruto}
                className={`w-full py-3 rounded-xl text-sm font-semibold transition-opacity ${formBruto ? "bg-amber-500 hover:bg-amber-400 text-black" : "bg-zinc-800 text-zinc-600 cursor-not-allowed"}`}>
                Lançar
              </button>

              {/* Registros existentes */}
              {registros.length > 0 && (
                <div className="border-t border-zinc-800 pt-3 space-y-1.5">
                  <div className="text-xs text-zinc-600 uppercase tracking-wide">Registros salvos</div>
                  {registros.map(r => (
                    <div key={r.key} className="flex items-center gap-2 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2">
                      <div className="flex-1 min-w-0">
                        <span className="text-xs font-medium capitalize text-zinc-300">{r.label}</span>
                        <span className="font-mono text-xs text-zinc-500 ml-2">{YEN(r.bruto)}</span>
                      </div>
                      <button onClick={() => remover(r.key)} className="text-zinc-600 hover:text-zinc-300 text-lg px-1">×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </Card>
  );
}

function DashboardScreen({ entries, settings, onAddEntry, auditHistory = [], storagePrefix }) {
  const [showForm, setShowForm] = useState(false);
  const [showYukyu, setShowYukyu] = useState(false);
  const [month, setMonth] = useState(new Date().toISOString().slice(0, 7));

  const thisMonth = month;
  const monthEntries = entries.filter((e) => e.date.startsWith(thisMonth));

  let accOT = 0;
  const calcs = monthEntries.map((e) => {
    const c = calcDay(e, settings, accOT);
    accOT += c.overtimeHours;
    return c;
  });

  const totals = calcs.reduce(
    (a, c) => ({
      totalHours: a.totalHours + c.totalHours,
      overtimeHours: a.overtimeHours + c.overtimeHours,
      nightHours: a.nightHours + c.nightHours,
      grossPay: a.grossPay + c.grossPay,
    }),
    { totalHours: 0, overtimeHours: 0, nightHours: 0, grossPay: 0 }
  );

  const deductionInfo = estimateDeductions(totals.grossPay, settings);

  // Última entrada
  const lastEntry = [...entries].sort((a, b) => b.date.localeCompare(a.date))[0];
  const lastCalc = lastEntry ? calcDay(lastEntry, settings) : null;

  // Dias trabalhados este mês
  const diasMes = monthEntries.length;

  const monthLabel = new Date(thisMonth + "-01").toLocaleDateString("pt-BR", { month: "long", year: "numeric" });

  return (
    <div className="space-y-3 pb-24 sm:pb-28">
      {/* Header mês */}
      <div className="pt-1 flex items-center justify-end gap-3">
        <div className="shrink-0">
          <MonthPicker value={month} onChange={setMonth} />
        </div>
      </div>

      {/* Cards de resumo */}
      <div className="grid grid-cols-2 gap-2">
        {(() => {
          const totalTeate = (settings.teate || []).filter(t => t.active).reduce((a, t) => a + (t.amount||0), 0);
          return (
            <>
              <SummaryCard icon="💴" label="Bruto Mês" value={YEN(totals.grossPay + totalTeate)} sub={totalTeate > 0 ? `inclui ${YEN(totalTeate)} teate` : "estimativa"} accent="text-green-400" />
              <SummaryCard icon="💰" label="Líquido Mês" value={YEN(deductionInfo.netPay + totalTeate)} sub="após descontos" accent="text-amber-400" />
            </>
          );
        })()}
        <SummaryCard icon="⏱️" label="Horas Totais" value={`${totals.totalHours.toFixed(1)}h`} sub={`${diasMes} dias`} />
        <SummaryCard icon="⚡" label="Horas Extras" value={`${totals.overtimeHours.toFixed(1)}h`}
          sub={totals.overtimeHours > 60 ? "⚠️ acima de 60h" : "este mês"}
          accent={totals.overtimeHours > 60 ? "text-red-400" : "text-amber-400"}
        />
      </div>

      {/* Barra de progresso horas extras */}
      {totals.overtimeHours > 0 && (
        <Card>
          <div className="flex justify-between text-xs mb-2">
            <span className="text-zinc-400">Horas Extras (limite 60h/mês)</span>
            <span className={`font-mono font-bold ${totals.overtimeHours > 60 ? "text-red-400" : "text-amber-400"}`}>
              {totals.overtimeHours.toFixed(1)}h / 60h
            </span>
          </div>
          <div className="w-full h-2 bg-zinc-800 rounded-full overflow-hidden">
            <div
              className={`h-2 rounded-full transition-all ${totals.overtimeHours > 60 ? "bg-red-500" : "bg-amber-500"}`}
              style={{ width: `${Math.min(100, (totals.overtimeHours / 60) * 100)}%` }}
            />
          </div>
        </Card>
      )}

      {/* 有給 Mini Cards */}
      {(() => {
        const entitlement = getYukyuEntitlement(settings.hireDate);
        const usedDays = entries.filter(e => e.dayType === "yukyu").length;
        const availableDays = entitlement?.daysTotal || 0;
        const remainingDays = Math.max(0, availableDays - usedDays);
        const hasAlert = entitlement?.expiringAlerts?.length > 0;
        return (
          <div className="flex gap-2">
            {/* Card: disponíveis */}
            <div className="flex-1 bg-zinc-900/80 border border-zinc-800 rounded-xl p-2.5">
              <div className="flex items-center gap-1.5 text-zinc-500 text-xs mb-1">
                <span>🌿</span>
                <span className="uppercase tracking-widest font-medium text-xs">有給 disponível</span>
              </div>
              <div className="text-xl font-bold text-green-400">{remainingDays} <span className="text-sm font-normal text-zinc-500">dias</span></div>
              <div className="text-xs text-zinc-600 mt-0.5">Folga Remunerada (Yuukyuu)</div>
              {hasAlert && <div className="text-xs text-red-400 mt-0.5">⚠️ vencendo em breve</div>}
              {!settings.hireDate && <div className="text-xs text-zinc-600 mt-0.5">configure contratação</div>}
            </div>
            {/* Card: utilizados — clicável */}
            <button
              onClick={() => setShowYukyu(true)}
              className="flex-1 bg-zinc-900/80 border border-zinc-800 rounded-xl p-2.5 text-left hover:border-green-800/60 transition-all"
            >
              <div className="flex items-center gap-1.5 text-zinc-500 text-xs mb-1">
                <span>📋</span>
                <span className="uppercase tracking-widest font-medium text-xs">有給 usadas</span>
              </div>
              <div className="text-xl font-bold text-amber-400">{usedDays} <span className="text-sm font-normal text-zinc-500">dias</span></div>
              <div className="text-xs text-zinc-600 mt-0.5">Folga Remunerada (Yuukyuu)</div>
              <div className="text-xs text-zinc-600">toque para ver histórico</div>
            </button>
          </div>
        );
      })()}

      <Art26Card month={month} storagePrefix={storagePrefix} />

      {showForm && (
        <EntryForm
          settings={settings}
          entries={entries}
          onSave={(entry) => { onAddEntry(entry); setShowForm(false); }}
          onClose={() => setShowForm(false)}
        />
      )}
      {showYukyu && (
        <YukyuModal
          entries={entries}
          settings={settings}
          onAddEntry={(entry) => { onAddEntry(entry); setShowYukyu(false); }}
          onClose={() => setShowYukyu(false)}
        />
      )}
    </div>
  );
}

      <div className="text-zinc-600 mt-1">
        • 17:00–22:00: 5h normais · 22:00–03:45: {formatMinutes(calc.nightMin)} noturno
        · HE = {formatMinutes(calc.overtimeDailyMin)} (acima de 8h)
      </div>
    </div>
  );
}

function exportBackup(entries, settings, gastos, carro, auditHistory) {
  const data = {
    version: 3,
    exportedAt: new Date().toISOString(),
    entries,
    settings,
    gastos: gastos || null,
    carro: carro || null,
    auditHistory: auditHistory || [],
  };
  const json = JSON.stringify(data, null, 2);
  const date = new Date().toISOString().slice(0, 10);
  // data: URI works inside iframes/artifacts unlike createObjectURL
  const uri = "data:application/json;charset=utf-8," + encodeURIComponent(json);
  const a = document.createElement("a");
  a.href = uri;
  a.download = `jst-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  return json; // return so we can show copy fallback if download fails
}

function parseBackup(jsonText) {
  const data = JSON.parse(jsonText);
  if (!data.entries || !Array.isArray(data.entries)) throw new Error("Arquivo inválido");
  return data;
}

// ─── Modal de Backup ───
function BackupModal({ entries, settings, gastos, carro, auditHistory, onRestore, onClose }) {
  const [tab, setTab] = useState("export");
  const [dragOver, setDragOver] = useState(false);
  const [preview, setPreview] = useState(null);
  const [error, setError] = useState(null);
  const [driveStatus, setDriveStatus] = useState(null); // null | "saving" | "saved" | "loading" | "error"
  const [driveMsg, setDriveMsg] = useState("");

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = parseBackup(e.target.result);
        setPreview(data);
        setError(null);
      } catch {
        setError("Arquivo inválido. Use um backup gerado por este app.");
        setPreview(null);
      }
    };
    reader.readAsText(file);
  }

  function handleDrop(e) {
    e.preventDefault();
    setDragOver(false);
    handleFile(e.dataTransfer.files[0]);
  }

  const [showRestoreConfirm, setShowRestoreConfirm] = useState(false);

  function confirmRestore() {
    if (!preview) return;
    setShowRestoreConfirm(true);
  }

  function doRestore() {
    onRestore(preview);
    onClose();
  }

  const lastBackupKey = "jst_last_backup";
  const lastBackup = localStorage.getItem(lastBackupKey);
  const daysSinceBackup = lastBackup
    ? Math.floor((Date.now() - new Date(lastBackup)) / 86400000)
    : null;

  const [backupJson, setBackupJson] = useState(null);

  function doExport() {
    const json = exportBackup(entries, settings, gastos, carro, auditHistory);
    localStorage.setItem(lastBackupKey, new Date().toISOString());
    setBackupJson(json);
  }

  async function saveToGoogleDrive() {
    setDriveStatus("saving");
    setDriveMsg("Conectando ao Google Drive...");
    try {
      const backupData = exportBackup(entries, settings, gastos, carro, auditHistory);
      const filename = "japan-salary-backup-" + new Date().toISOString().slice(0,10) + ".json";

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          mcp_servers: [{ type: "url", url: "https://drive.mcp.claude.com/mcp", name: "gdrive" }],
          messages: [{
            role: "user",
            content: `Save this JSON backup to Google Drive as a file named "${filename}" in the root folder. The file content is:

${backupData}

After saving, confirm with: SAVED_OK:[filename]`
          }]
        })
      });

      const data = await response.json();
      const text = data.content?.map(b => b.text || "").join("") || "";

      if (text.includes("SAVED_OK") || text.toLowerCase().includes("salvo") || text.toLowerCase().includes("saved") || text.toLowerCase().includes("criado") || text.toLowerCase().includes("created")) {
        setDriveStatus("saved");
        setDriveMsg("✅ Salvo no Google Drive: " + filename);
        localStorage.setItem(lastBackupKey, new Date().toISOString());
      } else {
        setDriveStatus("error");
        setDriveMsg("⚠️ Resposta inesperada. Verifique o Drive manualmente.");
        console.log("Drive response:", text);
      }
    } catch (e) {
      setDriveStatus("error");
      setDriveMsg("❌ Erro: " + e.message);
    }
  }

  async function loadFromGoogleDrive() {
    setDriveStatus("loading");
    setDriveMsg("Buscando backup no Google Drive...");
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 8000,
          mcp_servers: [{ type: "url", url: "https://drive.mcp.claude.com/mcp", name: "gdrive" }],
          messages: [{
            role: "user",
            content: "Find the most recent file named japan-salary-backup-*.json in Google Drive. Return ONLY the raw JSON content of that file, nothing else, no explanation."
          }]
        })
      });

      const data = await response.json();
      const text = data.content?.map(b => b.text || "").join("") || "";

      // Try to parse what was returned
      const jsonStart = text.indexOf("{");
      const jsonEnd = text.lastIndexOf("}");
      if (jsonStart >= 0 && jsonEnd > jsonStart) {
        const jsonStr = text.slice(jsonStart, jsonEnd + 1);
        const parsed = parseBackup(jsonStr);
        setPreview(parsed);
        setDriveStatus("loaded");
        setDriveMsg("✅ Backup encontrado! Vá na aba Importar para restaurar.");
        setTab("import");
      } else {
        setDriveStatus("error");
        setDriveMsg("❌ Nenhum backup encontrado no Drive.");
      }

      setDriveMsg("❌ Erro ao carregar: " + e.message);

                <div className="flex justify-between text-sm">

                  </span>
                </div>
              </div>

              {daysSinceBackup === null && (
                <div className="bg-red-900/20 border border-red-800/40 rounded-xl p-3 text-xs text-red-300">
                  ⚠️ Você ainda não fez backup! Se o browser limpar os dados, você perde tudo. Faça agora.

              {daysSinceBackup !== null && daysSinceBackup > 7 && (

              <div className="bg-zinc-900/50 rounded-xl p-3 text-xs text-zinc-500 space-y-1">

function MonthPicker({ value, onChange }) {
  function shift(delta) {
    const [y, m] = value.split("-").map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    const ny = d.getFullYear();
    const nm = String(d.getMonth() + 1).padStart(2, "0");
    onChange(ny + "-" + nm);
  }
  const label = new Date(value + "-01").toLocaleDateString("pt-BR", { month: "long", year: "numeric" });
  const labelFmt = label.charAt(0).toUpperCase() + label.slice(1);

  return (
    <div className="flex items-center gap-1">
      <button onClick={() => shift(-1)}
        className="w-8 h-8 flex items-center justify-center rounded-lg border transition-colors hover:border-amber-500 hover:text-amber-400"
        style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>
        ‹
      </button>
      <div className="flex-1 text-center px-2 py-1.5 rounded-lg border text-sm font-medium"
        style={{borderColor:"var(--border)", color:"var(--text)", background:"var(--bg-card)", minWidth:"140px"}}>
        {labelFmt}
      </div>
      <button onClick={() => shift(1)}
        className="w-8 h-8 flex items-center justify-center rounded-lg border transition-colors hover:border-amber-500 hover:text-amber-400"
        style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>
        ›
      </button>
    </div>
  );
}
