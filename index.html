function GastosScreen({ gastos, onSave }) {
  const today = new Date().toISOString().slice(0, 7);
  const [month, setMonth] = useState(today);
  const [editMode, setEditMode] = useState(false);
  const [localGastos, setLocalGastos] = useState(gastos);
  const [copied, setCopied] = useState(false);
  const [showReport, setShowReport] = useState(false);
  const [reportText, setReportText] = useState("");

  // Sync when gastos prop changes
  useEffect(() => setLocalGastos(gastos), [gastos]);

  const overrides = localGastos.overrides?.[month] || {};

  // Get effective value: override for this month or default
  function getVal(item) {
    return overrides[item.id] !== undefined ? overrides[item.id] : item.amount;
  }

  function setOverride(id, val) {
    const newOverrides = {
      ...(localGastos.overrides || {}),
      [month]: { ...(localGastos.overrides?.[month] || {}), [id]: val },
    };
    const updated = { ...localGastos, overrides: newOverrides };
    setLocalGastos(updated);
    onSave(updated);
  }

  function toggleActive(type, id) {
    const updated = {
      ...localGastos,
      [type]: localGastos[type].map(i => i.id === id ? { ...i, active: !i.active } : i),
    };
    setLocalGastos(updated);
    onSave(updated);
  }

  function updateDefault(type, id, field, val) {
    const updated = {
      ...localGastos,
      [type]: localGastos[type].map(i => i.id === id ? { ...i, [field]: val } : i),
    };
    setLocalGastos(updated);
    onSave(updated);
  }

  function addItem(tipo) {
    // Permanent: adds to all months
    const newItem = { id: "d" + Date.now(), name: "Nova despesa", amount: 0, tipo, active: true };
    const updated = { ...localGastos, despesas: [...localGastos.despesas, newItem] };
    setLocalGastos(updated);
    onSave(updated);
    setTimeout(() => setEditingItem({ item: newItem, type: "despesas", tempVal: "", tempName: "Nova despesa" }), 50);
  }

  function addItemThisMonth(tipo) {
    // Temporary: only exists for current month
    const newItem = { id: "m" + Date.now(), name: "Nova despesa", amount: 0, tipo };
    const mi = { ...(localGastos.monthItems || {}) };
    mi[month] = [...(mi[month] || []), newItem];
    const updated = { ...localGastos, monthItems: mi };
    setLocalGastos(updated);
    onSave(updated);
    setTimeout(() => setEditingItem({ item: newItem, type: "monthItems", tempVal: "", tempName: "Nova despesa" }), 50);
  }

  function removeMonthItem(id) {
    // Deletes item only from current month (for month-only items)
    const mi = { ...(localGastos.monthItems || {}) };
    mi[month] = (mi[month] || []).filter(i => i.id !== id);
    const updated = { ...localGastos, monthItems: mi };
    setLocalGastos(updated);
    onSave(updated);
  }

  function addRendaThisMonth() {
    const newItem = { id: "m" + Date.now(), name: "Nova renda", amount: 0 };
    const mi = { ...(localGastos.monthItems || {}) };
    mi[month] = [...(mi[month] || []), { ...newItem, tipo: "renda" }];
    const updated = { ...localGastos, monthItems: mi };
    setLocalGastos(updated);
    onSave(updated);
    setTimeout(() => setEditingItem({ item: newItem, type: "monthItems", tempVal: "", tempName: "Nova renda" }), 50);
  }


  function addRenda() {
    const newItem = { id: "r" + Date.now(), name: "Nova renda", amount: 0, active: true };
    const updated = { ...localGastos, rendas: [...localGastos.rendas, newItem] };
    setLocalGastos(updated);
    onSave(updated);
    setTimeout(() => setEditingItem({ item: newItem, type: "rendas", tempVal: "", tempName: "Nova renda" }), 50);
  }

  function removeItem(type, id) {
    // Permanently removes item from all months — use with caution
    const updated = { ...localGastos, [type]: localGastos[type].filter(i => i.id !== id) };
    setLocalGastos(updated);
    onSave(updated);
  }

  function hideForMonth(id) {
    // Hides item only for current month — does NOT affect other months
    const monthHidden = { ...(localGastos.monthHidden || {}) };
    const current = monthHidden[month] ? [...monthHidden[month]] : [];
    if (!current.includes(id)) current.push(id);
    monthHidden[month] = current;
    const updated = { ...localGastos, monthHidden };
    setLocalGastos(updated);
    onSave(updated);
  }

  function showForMonth(id) {
    // Restores item visibility for current month
    const monthHidden = { ...(localGastos.monthHidden || {}) };
    const current = (monthHidden[month] || []).filter(x => x !== id);
    monthHidden[month] = current;
    const updated = { ...localGastos, monthHidden };
    setLocalGastos(updated);
    onSave(updated);
  }

  const hiddenThisMonth = (localGastos.monthHidden || {})[month] || [];
  const monthItemsList = ((localGastos.monthItems || {})[month] || []);
  const miDebito = monthItemsList.filter(i => i.tipo === "debito").reduce((a, i) => a + i.amount, 0);
  const miHagaki = monthItemsList.filter(i => i.tipo === "hagaki").reduce((a, i) => a + i.amount, 0);
  const miRenda  = monthItemsList.filter(i => i.tipo === "renda").reduce((a, i) => a + i.amount, 0);

  function clearOverride(id) {
    const monthOvr = { ...(localGastos.overrides?.[month] || {}) };
    delete monthOvr[id];
    const updated = { ...localGastos, overrides: { ...(localGastos.overrides || {}), [month]: monthOvr } };
    setLocalGastos(updated);
    onSave(updated);
  }

  // Calculations
  const activeRendas = localGastos.rendas.filter(r => r.active && !hiddenThisMonth.includes(r.id));
  const totalRenda = activeRendas.reduce((a, r) => a + getVal(r), 0) + miRenda;

  const activeDebito = localGastos.despesas.filter(d => d.active && d.tipo === "debito");
  const activeHagaki = localGastos.despesas.filter(d => d.active && d.tipo === "hagaki");
  const totalDebito = activeDebito.filter(d => !hiddenThisMonth.includes(d.id)).reduce((a, d) => a + getVal(d), 0) + miDebito;
  const totalHagaki = activeHagaki.filter(d => !hiddenThisMonth.includes(d.id)).reduce((a, d) => a + getVal(d), 0) + miHagaki;
  const totalDespesas = totalDebito + totalHagaki;
  const saldo = totalRenda - totalDespesas;

  // Modal de edição de valor
  const [editingItem, setEditingItem] = useState(null); // { item, type, tempVal, tempName }

  function openEdit(item, type) {
    setEditingItem({ item, type, tempVal: getVal(item) ? String(getVal(item)) : "", tempName: item.name });
  }

  function confirmEdit() {
    if (!editingItem) return;
    const { item, type, tempVal, tempName } = editingItem;
    const v = parseInt(tempVal) || 0;

    if (type === "monthItems") {
      // Month-only item: update name and value in monthItems[month]
      const mi = { ...(localGastos.monthItems || {}) };
      mi[month] = (mi[month] || []).map(i => i.id === item.id ? { ...i, name: tempName, amount: v } : i);
      const updated = { ...localGastos, monthItems: mi };
      setLocalGastos(updated);
      onSave(updated);
      setEditingItem(null);
      return;
    }

    // Permanent item: update name globally, value only as monthly override
    const listKey = (type === "renda" || type === "rendas") ? "rendas" : "despesas";
    const updatedList = localGastos[listKey].map(i =>
      i.id === item.id ? { ...i, name: tempName } : i
    );
    const monthOvr = { ...(localGastos.overrides?.[month] || {}), [item.id]: v };
    const updated = {
      ...localGastos,
      [listKey]: updatedList,
      overrides: { ...(localGastos.overrides || {}), [month]: monthOvr },
    };
    setLocalGastos(updated);
    onSave(updated);
    setEditingItem(null);
  }

  function DespesaRow({ item, type, tipoDesp }) {
    const val = getVal(item);
    const hasOverride = overrides[item.id] !== undefined;
    // Toggle color per section type
    const toggleActive_color = tipoDesp === "renda"
      ? (item.active ? "bg-green-500" : "bg-zinc-700")
      : tipoDesp === "hagaki"
        ? (item.active ? "bg-blue-500" : "bg-zinc-700")
        : (item.active ? "bg-amber-500" : "bg-zinc-700"); // debito = amber
    return (
      <div className={`flex items-center gap-2 py-2 border-b last:border-0 transition-opacity ${!item.active ? "opacity-40" : ""}`}
        style={{ borderColor: "var(--border)" }}>
        {/* Toggle */}
        <div onClick={() => toggleActive(type, item.id)}
          className={`w-7 h-3.5 rounded-full shrink-0 cursor-pointer transition-colors ${toggleActive_color}`}>
          <div className={`w-2.5 h-2.5 bg-white rounded-full m-0.5 transition-transform ${item.active ? "translate-x-3.5" : ""}`} />
        </div>
        {/* Name */}
        <span className="flex-1 text-xs" style={{ color: "var(--text)" }}>{item.name}</span>
        {/* Override indicator */}
        {hasOverride && (
          <button onClick={() => clearOverride(item.id)} className="text-xs text-amber-500 shrink-0" title="Resetar">↺</button>
        )}
        {/* Value — tap to edit */}
        <button
          onClick={() => openEdit(item, type)}
          className="flex items-center gap-1 px-2 py-1 rounded-lg shrink-0 transition-colors hover:bg-zinc-800/60 active:bg-zinc-700/60"
        >
          <span className="text-xs font-mono font-semibold" style={{ color: hasOverride ? "#f59e0b" : "var(--text)" }}>
            {YEN(val)}
          </span>
          <span className="text-xs" style={{ color: "var(--text-muted)" }}>✏️</span>
        </button>
        {editMode && (
          <button
            onClick={() => hideForMonth(item.id)}
            title="Ocultar neste mês (não apaga histórico)"
            className="text-zinc-500 hover:text-orange-400 text-xs shrink-0 ml-1 transition-colors">
            ✕
          </button>
        )}
      </div>
    );
  }

  const [confirmReset, setConfirmReset] = useState(null); // { title, tipoDesp }
  const [confirmDelete, setConfirmDelete] = useState(null); // { type, id, name }

  function doReset(tipoDesp) {
    // Zero overrides only for items of this specific tipo (debito or hagaki) in current month
    const sectionItems = tipoDesp === "renda"
      ? localGastos.rendas
      : localGastos.despesas.filter(d => d.tipo === tipoDesp);
    const monthOvr = { ...(localGastos.overrides?.[month] || {}) };
    sectionItems.forEach(item => { monthOvr[item.id] = 0; });
    const upd = { ...localGastos, overrides: { ...(localGastos.overrides || {}), [month]: monthOvr } };
    setLocalGastos(upd);
    onSave(upd);
    setConfirmReset(null);
  }

  function Section({ title, icon, color, items, tipoDesp, total, onAdd, onAddMonth, badge }) {
    const allSectionItems = tipoDesp === "renda"
      ? localGastos.rendas
      : localGastos.despesas.filter(d => d.tipo === tipoDesp);
    const visibleItems = allSectionItems.filter(item => !hiddenThisMonth.includes(item.id));
    const hiddenItems  = allSectionItems.filter(item =>  hiddenThisMonth.includes(item.id));
    const hasValues = visibleItems.some(item => getVal(item) > 0);

    return (
      <Card>
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-1.5">
            <span>{icon}</span>
            <span className="text-xs font-semibold uppercase tracking-widest" style={{color}}>{title}</span>
            {badge && <span className="text-xs px-1.5 py-0.5 rounded-full bg-zinc-800 text-zinc-400">{badge}</span>}
          </div>
          <div className="flex items-center gap-2">
            {tipoDesp !== "renda" && hasValues && (
              <button
                onClick={() => setConfirmReset({ title, tipoDesp })}
                title={"Zerar " + title + " em " + month}
                className="w-6 h-6 flex items-center justify-center rounded-lg border border-zinc-700 hover:border-red-600 text-zinc-500 hover:text-red-400 transition-colors text-xs"
              >
                ↺
              </button>
            )}
            <span className="text-sm font-semibold font-mono" style={{color}}>{YEN(total)}</span>
          </div>
        </div>
        {visibleItems.map(item => <DespesaRow key={item.id} item={item} type={tipoDesp === "renda" ? "rendas" : "despesas"} tipoDesp={tipoDesp} />)}
        {/* Month-only items */}
        {((localGastos.monthItems || {})[month] || []).filter(i => i.tipo === tipoDesp || (tipoDesp === "renda" && i.tipo === "renda")).map(item => (
          <div key={item.id} className="flex items-center gap-2 py-2 border-b last:border-0" style={{borderColor:"var(--border)"}}>
            <span className="text-xs px-1 py-0.5 rounded text-blue-400 border border-blue-800/50 shrink-0" style={{fontSize:"9px"}}>MÊS</span>
            <span className="flex-1 text-xs" style={{color:"var(--text)"}}>{item.name}</span>
            <button onClick={() => setEditingItem({ item, type: "monthItems", tempVal: item.amount ? String(item.amount) : "", tempName: item.name })}
              className="flex items-center gap-1 px-2 py-1 rounded-lg text-xs font-mono font-semibold shrink-0"
              style={{color:"var(--text)"}}>
              {YEN(item.amount)} <span style={{color:"var(--text-muted)"}}>✏️</span>
            </button>
            {editMode && (
              <button onClick={() => removeMonthItem(item.id)} className="text-red-400 text-xs shrink-0 ml-1" title="Remover deste mês">✕</button>
            )}
          </div>
        ))}
        {hiddenItems.length > 0 && (
          <div className="mt-1 pt-1 border-t" style={{borderColor:"var(--border)"}}>
            <div className="text-xs mb-1" style={{color:"var(--text-muted)"}}>Ocultos neste mês:</div>
            {hiddenItems.map(item => (
              <div key={item.id} className="flex items-center gap-2 py-1.5 opacity-40">
                <span className="flex-1 text-xs line-through" style={{color:"var(--text-muted)"}}>{item.name}</span>
                <button onClick={() => showForMonth(item.id)}
                  title="Mostrar neste mês"
                  className="text-xs text-blue-400 hover:text-blue-300 shrink-0">👁</button>
                {editMode && (
                  <button
                    onClick={() => setConfirmDelete({ type: tipoDesp === "renda" ? "rendas" : "despesas", id: item.id, name: item.name })}
                    title="Apagar permanentemente"
                    className="text-xs text-red-600 hover:text-red-400 shrink-0">🗑</button>
                )}
              </div>
            ))}
          </div>
        )}
        {editMode && (
          <div className="flex gap-2 mt-2">
            <button onClick={onAdd}
              className="flex-1 py-1.5 rounded-lg border border-dashed text-xs transition-colors hover:border-amber-600 hover:text-amber-400"
              style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>
              + Fixo (todos os meses)
            </button>
            <button onClick={onAddMonth}
              className="flex-1 py-1.5 rounded-lg border border-dashed text-xs transition-colors hover:border-blue-600 hover:text-blue-400"
              style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>
              + Só este mês
            </button>
          </div>
        )}
      </Card>
    );
  }

    // Edit modal — rendered as function call to avoid IIFE JSX parse issues
  function renderEditModal() {
    if (!editingItem) return null;
    const { item, type, tempVal, tempName } = editingItem;
    const hasOvr = overrides[item.id] !== undefined;
    return (
      <div className={`fixed inset-0 z-50 flex flex-col justify-start pt-8 px-4`} style={{background:"rgba(0,0,0,0.82)"}}>
        <div className="w-full max-w-lg mx-auto rounded-2xl overflow-hidden shadow-2xl border"
          style={{background:"var(--bg-card)", borderColor:"var(--border)"}}>
          <div className="flex items-center justify-between px-4 py-3 border-b" style={{borderColor:"var(--border)"}}>
            <h3 className="text-sm font-semibold" style={{color:"var(--text)"}}>✏️ {tempName || "Editar"}</h3>
            <button onClick={() => setEditingItem(null)} className="text-2xl leading-none" style={{color:"var(--text-muted)"}}>×</button>
          </div>
          <div className="p-4 space-y-3">
            <div className="flex flex-col gap-1">
              <label className="text-xs uppercase tracking-wide font-medium" style={{color:"var(--text-muted)"}}>Nome</label>
              <input
                value={tempName}
                onChange={e => setEditingItem(prev => ({...prev, tempName: e.target.value}))}
                className="rounded-xl px-4 py-2.5 text-sm border focus:outline-none focus:border-amber-500 transition-all"
                style={{background:"var(--bg-card)", borderColor:"var(--border)", color:"var(--text)"}}
                placeholder="Nome da despesa"
              />
            </div>
            <div className="flex flex-col gap-1">
              <label className="text-xs uppercase tracking-wide font-medium" style={{color:"var(--text-muted)"}}>Valor</label>
              <div className="relative">
                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-xl font-bold" style={{color:"var(--text-muted)"}}>¥</span>
                <input
                  type="number"
                  inputMode="numeric"
                  pattern="[0-9]*"
                  value={tempVal}
                  onChange={e => setEditingItem(prev => ({...prev, tempVal: e.target.value}))}
                  className="w-full rounded-xl pl-10 pr-4 py-3 text-2xl font-bold font-mono text-right border focus:outline-none focus:border-amber-500 transition-all"
                  style={{background:"var(--bg-card)", borderColor:"var(--border)", color:"var(--text)"}}
                />
              </div>
            </div>
            <div className="grid grid-cols-4 gap-2">
              {[0, 5000, 10000, 50000].map(v => (
                <button key={v}
                  onClick={() => setEditingItem(prev => ({...prev, tempVal: String(v)}))}
                  className={`py-2 rounded-xl text-xs font-semibold border transition-all ${String(v) === tempVal ? "bg-amber-500 border-amber-500 text-black" : ""}`}
                  style={String(v) !== tempVal ? {borderColor:"var(--border)", color:"var(--text-sub)", background:"var(--bg-card)"} : {}}>
                  {v === 0 ? "Zero" : YEN(v)}
                </button>
              ))}
            </div>
            {hasOvr && (
              <button onClick={() => { clearOverride(item.id); setEditingItem(null); }}
                className="w-full py-2 rounded-xl border text-xs"
                style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>
                ↺ Restaurar padrão ({YEN(item.amount)})
              </button>
            )}
          </div>
          <div className="flex gap-3 px-4 pb-4">
            <button onClick={() => setEditingItem(null)}
              className="flex-1 py-3 rounded-xl border text-sm font-medium"
              style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>
              Cancelar
            </button>
            <button onClick={confirmEdit}
              className="flex-1 py-3 rounded-xl bg-amber-500 hover:bg-amber-400 text-black font-semibold text-sm">
              Confirmar ✓
            </button>
          </div>
        </div>
        <div className="flex-1" onClick={() => setEditingItem(null)} />
      </div>
    );
  }

  return (
    <div className="space-y-3 pb-24 sm:pb-28">
      {/* Header */}
      <div className="flex items-center justify-between pt-1">
        <div>
          <div className="text-xs uppercase tracking-widest" style={{color:"var(--text-muted)"}}>Controle de Gastos</div>
          <h2 className="text-lg font-bold" style={{color:"var(--text)"}}>Ganhos & Despesas</h2>
        </div>
        <div className="flex items-center gap-2">

          <button onClick={() => setEditMode(!editMode)}
            className={`text-xs px-3 py-1.5 rounded-lg border-2 font-semibold transition-all ${editMode ? "bg-red-500 border-red-400 text-white edit-mode-active" : "border-zinc-700 text-zinc-400"}`}>
            {editMode ? "🔴 Editando — toque para sair" : "✏️ Editar"}
          </button>
        </div>
      </div>

      <div className="flex items-center gap-2">
        <div className="flex-1">
          <MonthPicker value={month} onChange={setMonth} />
        </div>

        {/* Botão copiar relatório WhatsApp */}
        <button
          onClick={() => {
            const monthLabel = new Date(month + "-01").toLocaleDateString("pt-BR", {month:"long", year:"numeric"});
            const fmt = (v) => new Intl.NumberFormat("ja-JP", {style:"currency", currency:"JPY"}).format(v);

            let ls = [];
            ls.push("📊 *Resumo Financeiro*");
            ls.push("🗓 " + monthLabel.charAt(0).toUpperCase() + monthLabel.slice(1));
            ls.push("");
            ls.push("💴 *RENDA*");
            localGastos.rendas.filter(r => r.active).forEach(r => {
              ls.push(r.name + ": " + fmt(getVal(r)));
            });
            ls.push("*Total Renda: " + fmt(totalRenda) + "*");
            ls.push("");
            const debAtivos = localGastos.despesas.filter(d => d.active && d.tipo === "debito");
            if (debAtivos.length > 0) {
              ls.push("🏦 *DÉBITO AUTOMÁTICO*");
              debAtivos.forEach(d => ls.push(d.name + ": " + fmt(getVal(d))));
              ls.push("*Subtotal: " + fmt(totalDebito) + "*");
              ls.push("");
            }
            const hagAtivos = localGastos.despesas.filter(d => d.active && d.tipo === "hagaki");
            if (hagAtivos.length > 0) {
              ls.push("📮 *HAGAKI (Boleto)*");
              hagAtivos.forEach(d => ls.push(d.name + ": " + fmt(getVal(d))));
              ls.push("*Subtotal: " + fmt(totalHagaki) + "*");
              ls.push("");
            }
            ls.push("─────────────────");
            ls.push("💴 Renda: " + fmt(totalRenda));
            ls.push("🏦 Débito Auto: " + fmt(totalDebito));
            ls.push("📮 Hagaki (sacar): " + fmt(totalHagaki));
            ls.push("💸 Total Despesas: " + fmt(totalDespesas));
            ls.push("✅ *Saldo Final: " + fmt(saldo) + "*");
            if (totalHagaki > 0) {
              ls.push("");
              ls.push("💵 *Precisa sacar em mãos: " + fmt(totalHagaki) + "*");
            }
            setReportText(ls.join("\n"));
            setShowReport(true);
          }}
          className={`w-9 h-9 flex items-center justify-center rounded-lg border transition-all shrink-0 ${copied ? "bg-green-600 border-green-600" : "border-zinc-700 hover:border-amber-600"}`}
          title="Copiar resumo para WhatsApp"
        >
          {copied ? "✓" : "📋"}
        </button>
      </div>

      <div className="grid grid-cols-2 gap-2">
        <Card>
          <div className="text-xs mb-1" style={{color:"var(--text-muted)"}}>💴 Renda</div>
          <div className="text-xl font-bold text-green-400 font-mono">{YEN(totalRenda)}</div>
        </Card>
        <Card>
          <div className="text-xs mb-1" style={{color:"var(--text-muted)"}}>💸 Despesas</div>
          <div className="text-xl font-bold text-red-400 font-mono">{YEN(totalDespesas)}</div>
        </Card>
      </div>

      <Card className={`border-2 ${saldo >= 0 ? "border-green-700/50" : "border-red-700/50"}`}>
        <div className="flex justify-between items-center">
          <div>
            <div className="text-xs uppercase tracking-widest font-semibold" style={{color:"var(--text-muted)"}}>Saldo Final</div>
            <div className="text-xs mt-0.5" style={{color:"var(--text-muted)"}}>
              Débito: <span className="font-mono text-blue-400">{YEN(totalDebito)}</span> · Hagaki: <span className="font-mono text-orange-400">{YEN(totalHagaki)}</span>
            </div>
          </div>
          <div className={`text-2xl font-bold font-mono ${saldo >= 0 ? "text-green-400" : "text-red-400"}`}>
            {saldo < 0 ? "-" : ""}{YEN(Math.abs(saldo))}
          </div>
        </div>
        <div className="mt-3 w-full h-2 bg-zinc-800 rounded-full overflow-hidden">
          <div className="h-2 rounded-full transition-all"
            style={{width: totalRenda > 0 ? `${Math.min(100,(totalDespesas/totalRenda)*100)}%` : "0%",
                    background: saldo >= 0 ? "#22c55e" : "#ef4444"}} />
        </div>
        <div className="flex justify-between text-xs mt-1" style={{color:"var(--text-muted)"}}>
          <span>0%</span>
          <span>{totalRenda > 0 ? Math.round((totalDespesas/totalRenda)*100) : 0}% comprometida</span>
        </div>
      </Card>

      {totalHagaki > 0 && (
        <div className="bg-orange-900/20 border border-orange-800/40 rounded-xl p-3 flex justify-between items-center">
          <div>
            <div className="text-xs font-semibold text-orange-400">💴 Precisa sacar em mãos</div>
            <div className="text-xs mt-0.5" style={{color:"var(--text-muted)"}}>Para {activeHagaki.length} boleto(s) Hagaki</div>
          </div>
          <div className="text-lg font-bold font-mono text-orange-400">{YEN(totalHagaki)}</div>
        </div>
      )}

      <Section title="Renda" icon="💴" color="#22c55e" items={localGastos.rendas}
        tipoDesp="renda" total={totalRenda} onAdd={addRenda} onAddMonth={addRendaThisMonth} />
      <Section title="Débito Automático" icon="🏦" color="#60a5fa"
        items={localGastos.despesas.filter(d => d.tipo === "debito")}
        tipoDesp="debito" total={totalDebito} onAdd={() => addItem("debito")} onAddMonth={() => addItemThisMonth("debito")}
        badge={`${activeDebito.length} ativos`} />
      <Section title="Hagaki (Boleto)" icon="📮" color="#fb923c"
        items={localGastos.despesas.filter(d => d.tipo === "hagaki")}
        tipoDesp="hagaki" total={totalHagaki} onAdd={() => addItem("hagaki")} onAddMonth={() => addItemThisMonth("hagaki")}
        badge={`${activeHagaki.length} ativos`} />

      {renderEditModal()}

      {/* Modal confirmação DELETE permanente */}
      {confirmDelete && (
        <div className="fixed inset-0 z-50 flex items-center justify-center px-6" style={{background:"rgba(0,0,0,0.85)"}}>
          <div className="w-full max-w-sm rounded-2xl overflow-hidden border shadow-2xl" style={{background:"var(--bg-card)", borderColor:"var(--border)"}}>
            <div className="p-5 text-center">
              <div className="text-3xl mb-3">🗑</div>
              <div className="text-sm font-semibold mb-1" style={{color:"var(--text)"}}>Apagar permanentemente?</div>
              <div className="text-xs" style={{color:"var(--text-muted)"}}>
                <span className="font-semibold text-red-400">{confirmDelete.name}</span> será removido de <span className="font-semibold text-red-400">todos os meses</span> e o histórico será perdido.
              </div>
              <div className="mt-2 text-xs text-zinc-600">Para ocultar só este mês, use ✕ em vez de 🗑</div>
            </div>
            <div className="flex border-t" style={{borderColor:"var(--border)"}}>
              <button onClick={() => setConfirmDelete(null)}
                className="flex-1 py-3 text-sm font-medium border-r" style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>
                Cancelar
              </button>
              <button onClick={() => { removeItem(confirmDelete.type, confirmDelete.id); setConfirmDelete(null); }}
                className="flex-1 py-3 text-sm font-semibold text-red-400">
                Apagar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Modal confirmação reset */}
      {confirmReset && (
        <div className="fixed inset-0 z-50 flex items-center justify-center px-6" style={{background:"rgba(0,0,0,0.8)"}}>
          <div className="w-full max-w-sm rounded-2xl overflow-hidden border shadow-2xl" style={{background:"var(--bg-card)", borderColor:"var(--border)"}}>
            <div className="p-5 text-center">
              <div className="text-3xl mb-3">↺</div>
              <div className="text-sm font-semibold mb-1" style={{color:"var(--text)"}}>Resetar {confirmReset.title}?</div>
              <div className="text-xs" style={{color:"var(--text-muted)"}}>
                Os valores de <span className="font-semibold text-amber-400">{month}</span> serão zerados.<br/>
                Meses anteriores não serão afetados.
              </div>
            </div>
            <div className="flex border-t" style={{borderColor:"var(--border)"}}>
              <button onClick={() => setConfirmReset(null)}
                className="flex-1 py-3 text-sm font-medium border-r" style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>
                Cancelar
              </button>
              <button onClick={() => doReset(confirmReset.tipoDesp)}
                className="flex-1 py-3 text-sm font-semibold text-red-400">
                Sim, zerar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Modal de relatório WhatsApp */}
      {showReport && (
        <div className="fixed inset-0 z-50 flex flex-col justify-start pt-6 px-4" style={{background:"rgba(0,0,0,0.85)"}}>
          <div className="w-full max-w-lg mx-auto rounded-2xl overflow-hidden shadow-2xl border" style={{background:"var(--bg-card)", borderColor:"var(--border)"}}>
            <div className="flex items-center justify-between px-4 py-3 border-b" style={{borderColor:"var(--border)"}}>
              <div>
                <h3 className="text-sm font-semibold" style={{color:"var(--text)"}}>📋 Relatório para WhatsApp</h3>
                <p className="text-xs mt-0.5" style={{color:"var(--text-muted)"}}>Selecione tudo e copie</p>
              </div>
              <button onClick={() => setShowReport(false)} className="text-2xl leading-none" style={{color:"var(--text-muted)"}}>×</button>
            </div>
            <div className="p-4">
              <textarea
                readOnly
                value={reportText}
                rows={14}
                onClick={e => e.target.select()}
                className="w-full rounded-xl p-3 text-xs font-mono border focus:outline-none resize-none"
                style={{background:"var(--bg-card)", borderColor:"var(--border)", color:"var(--text)", lineHeight:"1.6"}}
              />
              <p className="text-xs text-center mt-2" style={{color:"var(--text-muted)"}}>
                Toque na caixa para selecionar → segure e escolha <strong>Copiar tudo</strong>
              </p>
            </div>
            <div className="px-4 pb-4 flex gap-3">
              <button
                onClick={() => {
                  try {
                    navigator.clipboard.writeText(reportText).then(() => {
                      setCopied(true);
                      setTimeout(() => { setCopied(false); setShowReport(false); }, 1500);
                    });
                  } catch(e) {}
                }}
                className="flex-1 py-2.5 rounded-xl border text-sm font-medium transition-colors"
                style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>
                {copied ? "✓ Copiado!" : "📋 Copiar"}
              </button>
              <button
                onClick={() => setShowReport(false)}
                className="flex-1 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-400 text-black font-semibold text-sm">
                Fechar
              </button>
            </div>
          </div>
          <div className="flex-1" onClick={() => setShowReport(false)} />
        </div>
      )}
    </div>
  );
}

function CarroScreen({ carro, onSave }) {
  const [selId, setSelId] = useState(carro.financiamentos[0]?.id || null);
  const [editMode, setEditMode] = useState(false);
  const [showAddFinanc, setShowAddFinanc] = useState(false);
  const [showAddParcela, setShowAddParcela] = useState(false);
  const [newFinanc, setNewFinanc] = useState({ nome: "", valorTotal: 0 });
  const [newParcela, setNewParcela] = useState({ valor: 50000, mesRef: "" });

  const financ = carro.financiamentos.find(f => f.id === selId);

  function save(updated) {
    onSave({ ...carro, financiamentos: carro.financiamentos.map(f => f.id === updated.id ? updated : f) });
  }

  function toggleParcela(pid) {
    if (!financ) return;
    save({ ...financ, parcelas: financ.parcelas.map(p => p.id === pid ? { ...p, pago: !p.pago } : p) });
  }

  function toggleEntrada(eid) {
    if (!financ) return;
    save({ ...financ, entradas: financ.entradas.map(e => e.id === eid ? { ...e, pago: !e.pago } : e) });
  }

  function addParcela() {
    if (!financ) return;
    const np = { id: "p" + Date.now(), numero: financ.parcelas.length + 1, valor: newParcela.valor, mesRef: newParcela.mesRef, pago: false };
    save({ ...financ, parcelas: [...financ.parcelas, np] });
    setShowAddParcela(false);
    setNewParcela({ valor: 50000, mesRef: "" });
  }

  function removeParcela(pid) {
    if (!financ) return;
    save({ ...financ, parcelas: financ.parcelas.filter(p => p.id !== pid) });
  }

  function addFinanciamento() {
    if (!newFinanc.nome) return;
    const nf = { id: "f" + Date.now(), nome: newFinanc.nome, valorTotal: newFinanc.valorTotal, entradas: [], parcelas: [] };
    onSave({ ...carro, financiamentos: [...carro.financiamentos, nf] });
    setSelId(nf.id);
    setShowAddFinanc(false);
    setNewFinanc({ nome: "", valorTotal: 0 });
  }

  if (!financ) {
    return (
      <div className="space-y-3 pb-24 sm:pb-28 pt-2">
        <Card className="text-center py-12">
          <div className="text-5xl mb-3">🚗</div>
          <div className="text-sm font-semibold" style={{color:"var(--text)"}}>Nenhum financiamento</div>
          <button onClick={() => setShowAddFinanc(true)} className="mt-4 px-4 py-2 rounded-xl bg-amber-500 text-black text-sm font-semibold">+ Adicionar</button>
        </Card>
        {showAddFinanc && (
          <div className="fixed inset-0 z-50 flex flex-col justify-start pt-8 px-4" style={{background:"rgba(0,0,0,0.82)"}}>
            <div className="w-full max-w-lg mx-auto rounded-2xl overflow-hidden border shadow-2xl" style={{background:"var(--bg-card)", borderColor:"var(--border)"}}>
              <div className="flex items-center justify-between px-4 py-3 border-b" style={{borderColor:"var(--border)"}}>
                <h3 className="text-sm font-semibold" style={{color:"var(--text)"}}>Novo Veículo</h3>
                <button onClick={() => setShowAddFinanc(false)} className="text-xl" style={{color:"var(--text-muted)"}}>x</button>
              </div>
              <div className="p-4 space-y-3">
                <div className="flex flex-col gap-1">
                  <label className="text-xs uppercase tracking-wide" style={{color:"var(--text-muted)"}}>Nome</label>
                  <input value={newFinanc.nome} onChange={e => setNewFinanc(f => ({...f, nome: e.target.value}))}
                    className="rounded-xl px-4 py-2.5 text-sm border focus:outline-none focus:border-amber-500"
                    style={{background:"var(--bg-card)", borderColor:"var(--border)", color:"var(--text)"}} placeholder="Ex: Outlander 2025" />
                </div>
                <div className="flex flex-col gap-1">
                  <label className="text-xs uppercase tracking-wide" style={{color:"var(--text-muted)"}}>Valor total</label>
                  <input type="number" inputMode="numeric" value={newFinanc.valorTotal}
                    onChange={e => setNewFinanc(f => ({...f, valorTotal: parseInt(e.target.value)||0}))}
                    className="rounded-xl px-4 py-3 text-xl font-bold font-mono text-right border focus:outline-none focus:border-amber-500"
                    style={{background:"var(--bg-card)", borderColor:"var(--border)", color:"var(--text)"}} />
                </div>
              </div>
              <div className="flex gap-3 px-4 pb-4">
                <button onClick={() => setShowAddFinanc(false)} className="flex-1 py-2.5 rounded-xl border text-sm" style={{borderColor:"var(--border)", color:"var(--text-muted)"}}>Cancelar</button>
                <button onClick={addFinanciamento} className="flex-1 py-2.5 rounded-xl bg-amber-500 text-black font-semibold text-sm">Criar</button>
              </div>
            </div>
            <div className="flex-1" onClick={() => setShowAddFinanc(false)} />

  const totalPago = financ.entradas.filter(e => e.pago).reduce((a, e) => a + e.valor, 0)

      <Card>
        <div className="text-xs font-semibold text-amber-400 uppercase tracking-widest mb-3">Progresso</div>

        </div>
        <div className="w-full h-3 bg-zinc-800 rounded-full overflow-hidden mb-3">

function App({ profileId, profileName, profileColor, profiles, onSwitchProfile }) {
  const KEYS = React.useMemo(() => getStorageKeys(profileId), [profileId]);
  const storagePrefix = `jst_p_${profileId}`;
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showInstall, setShowInstall] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      e.preventDefault();
      setInstallPrompt(e);
      setShowInstall(true);
    };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  function handleInstall() {
    if (!installPrompt) return;
    installPrompt.prompt();
    installPrompt.userChoice.then(() => {
      setInstallPrompt(null);
      setShowInstall(false);
    });
  }

  const [tab, setTab] = useState("dashboard");
  const [theme, setTheme] = useState(() => localStorage.getItem("jst_theme") || "dark");
  const [entries, setEntries] = useState(() => loadData(KEYS.entries, []));
  const [gastos, setGastos] = useState(() => loadData(KEYS.gastos, defaultGastos));
  const [auditHistory, setAuditHistory] = useState(() => loadData(KEYS.payslipAudit, []));
  const [carro, setCarro] = useState(() => {
    const saved = loadData(KEYS.carro, defaultCarro);
    if (saved?.financiamentos?.[0]?.id === "f1" && saved.financiamentos[0].valorTotal !== 570000) return defaultCarro;
    if (saved?.financiamentos?.[0]?.id === "f1" && saved.financiamentos[0].parcelas.length > 8) return defaultCarro;
    return saved;
  });
  const [settings, setSettings] = useState(() => {
    const saved = loadData(KEYS.settings, defaultSettings);
    if (!saved.teate || saved.teate.length === 0) saved.teate = defaultSettings.teate;
    return saved;
  });
  const [toast, setToast] = useState(null);
  const [showBackup, setShowBackup] = useState(false);
  const [backupReminder, setBackupReminder] = useState(false);

  const showToast = (msg, color = "green") => {
    setToast({ msg, color });
    setTimeout(() => setToast(null), 2500);
  };

  useEffect(() => { saveData(KEYS.entries, entries); }, [entries]);
  useEffect(() => { saveData(KEYS.settings, settings); }, [settings]);
  useEffect(() => { saveData(KEYS.gastos, gastos); }, [gastos]);
  useEffect(() => { saveData(KEYS.payslipAudit, auditHistory); }, [auditHistory]);
  useEffect(() => { saveData(KEYS.carro, carro); }, [carro]);
  useEffect(() => { localStorage.setItem("jst_theme", theme); }, [theme]);

  useEffect(() => {
    const last = localStorage.getItem("jst_last_backup");
    if (!last) { setBackupReminder(true); return; }
    const days = (Date.now() - new Date(last).getTime()) / 86400000;
    if (days > 7) setBackupReminder(true);
  }, []);

  function saveSettings(s) {
    setSettings(s);
    showToast("Configurações salvas!", "green");
  }

  const handleRestore = (data) => {
    if (data.entries && data.entries.length > 0) setEntries(data.entries);
    if (data.settings) setSettings(data.settings);
    if (data.gastos) setGastos(data.gastos);
    if (data.carro) setCarro(data.carro);
    if (data.auditHistory) setAuditHistory(data.auditHistory);
    showToast("Backup restaurado com sucesso!", "blue");
  };

  const bodyBg = theme === "dark" ? "#09090b" : "#f9f9f9";
  const rootCls = `min-h-screen font-sans theme-${theme} ` + (theme === "dark" ? "bg-zinc-950 text-zinc-100" : "text-neutral-900");

  const staticCss = `
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; height: -webkit-fill-available; }
        body {
          margin: 0;
          background: ${bodyBg};
          transition: background 0.3s;
          font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
          -webkit-font-smoothing: antialiased;
          overscroll-behavior: none;
          min-height: 100vh;
          min-height: -webkit-fill-available;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
        .font-mono { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; font-variant-numeric: tabular-nums lining-nums; }
        .safe-top    { padding-top:    max(12px, env(safe-area-inset-top)); }
        .safe-bottom { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
        button:active { opacity: 0.75; transform: scale(0.97); }
        input[type="time"] { -webkit-appearance: none; color-scheme: ${theme === "dark" ? "dark" : "light"}; }
        input[type="date"], input[type="month"] { color-scheme: ${theme === "dark" ? "dark" : "light"}; }
        input, select, textarea { font-size: 16px; }
        .theme-light { --bg: #f9f9f9; --bg-card: #ffffff; --border: #e0e0e0; --text: #111111; --text-sub: #444444; --text-muted: #909090; --accent: #b91c1c; }
        .theme-dark  { --bg: #09090b; --bg-card: rgba(24,24,27,0.8); --border: #27272a; --text: #f4f4f5; --text-sub: #a1a1aa; --text-muted: #52525b; --accent: #f59e0b; }

        /* Light mode: forçar todos os backgrounds dark para claro */
        .theme-light [class*="bg-zinc-9"],
        .theme-light [class*="bg-zinc-8"] { background-color: #f5f5f5 !important; }
        .theme-light [class*="bg-zinc-7"] { background-color: #ececec !important; }
        .theme-light [class*="border-zinc-8"],
        .theme-light [class*="border-zinc-7"] { border-color: #d4d4d4 !important; }
        .theme-light input,
        .theme-light select,
        .theme-light textarea {
          background: #ffffff !important;
          color: #111111 !important;
          border-color: #d4d4d4 !important;
        }
        .theme-light [class*="text-zinc-2"],
        .theme-light [class*="text-zinc-1"] { color: #222222 !important; }
        .theme-light [class*="text-zinc-4"],
        .theme-light [class*="text-zinc-5"],
        .theme-light [class*="text-zinc-6"] { color: #666666 !important; }

        @keyframes pulse-border { 0%,100% { border-color: #f59e0b; } 50% { border-color: #ef4444; } }
        .edit-mode-active { animation: pulse-border 1.5s ease-in-out infinite; }
        @media (min-width: 640px) { body { font-size: 15px; } }
        @media (min-width: 1024px) {
          .main-scroll { padding-bottom: 80px; }
          .bottom-nav-inner { padding: 0 2rem; }
        }
      `;

  return (
    <div className={rootCls}>
      <style>{staticCss}</style>

      {/* Top bar */}
      <div className={`sticky top-0 z-40 backdrop-blur border-b px-4 py-2 ${theme === "dark" ? "bg-zinc-950/90 border-zinc-800/50" : "bg-white/95 border-neutral-200"}`}>
        <div className="max-w-2xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="text-lg">⛩️</span>
            <button onClick={onSwitchProfile}
              className="flex items-center gap-1.5 ml-1 px-2 py-0.5 rounded-full text-xs font-semibold transition-colors"
              style={{background: profileColor + "33", color: profileColor, border: `1px solid ${profileColor}55`}}>
              <span className="w-4 h-4 rounded-full flex items-center justify-center font-bold shrink-0"
                style={{background: profileColor, color: "#000", fontSize:"9px"}}>
                {profileName.charAt(0).toUpperCase()}
              </span>
              {profileName.split(" ")[0]}
            </button>
          </div>
          <div className="flex items-center gap-2">
            <button
              onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
              className={`w-8 h-8 flex items-center justify-center rounded-lg border transition-colors ${theme === "dark" ? "border-zinc-700 hover:border-amber-600" : "border-neutral-300 hover:border-neutral-500"}`}
              title={theme === "dark" ? "Modo claro" : "Modo escuro"}
            >
              {theme === "dark" ? "☀️" : "🌙"}
            </button>
            {showInstall && (
              <button onClick={handleInstall}
                className="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-amber-500 hover:bg-amber-400 text-black text-xs font-medium transition-colors"
                title="Instalar app">
                ⬇ App
              </button>
            )}
            <button
              onClick={() => setShowBackup(true)}
              className="flex items-center gap-1.5 px-2.5 py-1 rounded-lg border border-zinc-700 hover:border-amber-600 transition-colors group"
              title="Backup"
            >
              <span className="text-sm">💾</span>
              <span className="text-xs text-zinc-400 group-hover:text-amber-400 transition-colors">Backup</span>
              {backupReminder && <span className="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse" />}
            </button>
          </div>
        </div>
      </div>

      {/* Toast */}
      {toast && (
        <div className={`fixed top-14 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-xl text-sm font-semibold shadow-lg transition-all ${
          toast.color === "blue" ? "bg-blue-600 text-white" :
          toast.color === "red" ? "bg-red-600 text-white" : "bg-green-600 text-white"
        }`}>
          {toast.msg}
        </div>
      )}

      {/* Content */}
      <div className="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 pt-3">
        {tab === "dashboard" && (
          <DashboardScreen entries={entries} settings={settings} onAddEntry={(e) => setEntries((prev) => [...prev, e])} auditHistory={auditHistory} storagePrefix={storagePrefix} />
        )}
        {tab === "entries" && (
          <EntriesScreen
            entries={entries}
            settings={settings}
            onAdd={(e) => setEntries((prev) => [...prev, e])}
            onEdit={(updated) => setEntries((prev) => prev.map((e) => (e.id === updated.id ? updated : e)))}
            onDelete={(id) => setEntries((prev) => prev.filter((e) => e.id !== id))}
          />
        )}
        {tab === "reports" && <ReportsScreen entries={entries} settings={settings} />}

        {tab === "gastos" && (
          <GastosScreen gastos={gastos} onSave={setGastos} />
        )}
        {tab === "carro" && (
          <CarroScreen carro={carro} onSave={setCarro} />
        )}
        {tab === "settings" && (
          <SettingsScreen settings={settings} onSave={saveSettings} entries={entries}
            auditHistory={auditHistory} onSaveAudit={setAuditHistory} />
        )}
      </div>

      {/* Bottom nav */}
      <div className={`fixed bottom-0 inset-x-0 z-40 backdrop-blur border-t ${theme === "dark" ? "bg-zinc-950/95 border-zinc-800/50" : "bg-white/95 border-neutral-200"}`}
        style={{paddingBottom: "env(safe-area-inset-bottom, 0px)"}}>
        <div className="max-w-2xl mx-auto flex">
          {TABS.map((t) => (
            <button
              key={t.id}
              onClick={() => setTab(t.id)}
              className={`flex-1 flex flex-col items-center py-2 transition-colors ${
                tab === t.id
                  ? theme === "dark" ? "text-amber-400" : "text-red-700"
                  : theme === "dark" ? "text-zinc-600 hover:text-zinc-400" : "text-neutral-400 hover:text-neutral-600"
              }`}
            >
              <span className="text-xl">{t.icon}</span>
              <span className="text-xs mt-0.5 font-medium">{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      {showBackup && (
        <BackupModal
          entries={entries}
          settings={settings}
          gastos={gastos}
          carro={carro}
          auditHistory={auditHistory}
          onRestore={handleRestore}
          onClose={() => setShowBackup(false)}
        />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// SELETOR DE PERFIS
// ─────────────────────────────────────────────

const PROFILE_COLORS = ["#f59e0b","#3b82f6","#ec4899","#10b981","#8b5cf6","#ef4444","#06b6d4","#f97316"];

function ProfileSelector({ profiles, activeId, onSelect, onAddProfile, onDeleteProfile, onClose }) {
  const [adding, setAdding] = React.useState(false);
  const [newName, setNewName] = React.useState("");
  const [newColor, setNewColor] = React.useState(PROFILE_COLORS[1]);
  const [confirmDelete, setConfirmDelete] = React.useState(null); // id a deletar

  function addProfile() {
    if (!newName.trim()) return;
    const pid = "u" + Date.now().toString(36);
    onAddProfile({ id: pid, name: newName.trim(), color: newColor });
    setAdding(false);
    setNewName("");
  }

  const theme = localStorage.getItem("jst_theme") || "dark";
  const bg   = theme === "dark" ? "#09090b" : "#f9f9f9";
  const card = theme === "dark" ? "#18181b" : "#ffffff";
  const text = theme === "dark" ? "#f4f4f5" : "#111111";
  const sub  = theme === "dark" ? "#a1a1aa" : "#555555";
  const bdr  = theme === "dark" ? "#27272a" : "#e4e4e7";

  return (
    <div className="fixed inset-0 z-50 flex flex-col" style={{background: bg}}>
      <div className="px-6 pt-14 pb-6">
        <div className="text-xs uppercase tracking-widest mb-1" style={{color: sub}}>給与管理</div>
        <h1 className="text-2xl font-bold" style={{color: text}}>Quem está usando?</h1>
      </div>

      <div className="flex-1 px-6 space-y-3 overflow-y-auto pb-6">
        {profiles.map(p => (
          <div key={p.id}>
            {confirmDelete === p.id ? (
              /* Confirmação de exclusão inline */
              <div className="p-4 rounded-2xl border space-y-3" style={{background: "#7f1d1d33", borderColor:"#ef4444"}}>
                <div className="text-sm font-semibold" style={{color: text}}>
                  Apagar perfil de <span style={{color:"#ef4444"}}>{p.name}</span>?
                </div>
                <div className="text-xs" style={{color: sub}}>Todos os dados deste perfil serão apagados permanentemente.</div>
                <div className="flex gap-2">
                  <button onClick={() => setConfirmDelete(null)}
                    className="flex-1 py-2.5 rounded-xl text-sm"
                    style={{background: card, border: `1px solid ${bdr}`, color: sub}}>
                    Cancelar
                  </button>
                  <button onClick={() => { onDeleteProfile(p.id); setConfirmDelete(null); }}
                    className="flex-1 py-2.5 rounded-xl text-sm font-semibold"
                    style={{background:"#ef4444", color:"#fff"}}>
                    Apagar
                  </button>
                </div>
              </div>
            ) : (
              <div className="flex items-center gap-2">
                <button onClick={() => onSelect(p.id)}
                  className="flex-1 flex items-center gap-4 p-4 rounded-2xl text-left transition-all"
                  style={{
                    background: p.id === activeId ? p.color + "22" : card,
                    border: `2px solid ${p.id === activeId ? p.color : bdr}`,
                  }}>
                  <div className="w-12 h-12 rounded-full flex items-center justify-center text-xl font-bold shrink-0"
                    style={{background: p.color, color: "#000"}}>
                    {p.name.charAt(0).toUpperCase()}
                  </div>
                  <div className="min-w-0">
                    <div className="font-semibold text-base" style={{color: text}}>{p.name}</div>
                    {p.id === activeId && <div className="text-xs" style={{color: sub}}>Ativo agora</div>}
                  </div>
                </button>
                {profiles.length > 1 && (
                  <button onClick={() => setConfirmDelete(p.id)}
                    className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 text-lg"
                    style={{background: card, border: `1px solid ${bdr}`, color: sub}}>
                    🗑
                  </button>
                )}
              </div>
            )}
          </div>
        ))}

        {adding ? (
          <div className="p-4 rounded-2xl border space-y-3" style={{background: card, borderColor: bdr}}>
            <input type="text" value={newName} onChange={e => setNewName(e.target.value)}
              placeholder="Nome do perfil" autoFocus
              onKeyDown={e => e.key === "Enter" && addProfile()}
              className="w-full rounded-xl px-3 py-2.5 text-sm"
              style={{background: bg, border: `1px solid ${bdr}`, color: text}}
            />
            <div className="flex gap-2 flex-wrap">
              {PROFILE_COLORS.map(c => (
                <button key={c} onClick={() => setNewColor(c)}
                  className="w-8 h-8 rounded-full"
                  style={{background: c, outline: newColor === c ? `3px solid ${text}` : "none", outlineOffset:"2px"}}
                />
              ))}
            </div>
            <div className="flex gap-2">
              <button onClick={() => setAdding(false)}
                className="flex-1 py-2.5 rounded-xl text-sm"
                style={{background: bg, border: `1px solid ${bdr}`, color: sub}}>
                Cancelar
              </button>
              <button onClick={addProfile} disabled={!newName.trim()}
                className="flex-1 py-2.5 rounded-xl text-sm font-semibold"
                style={{background:"#16a34a", color:"#fff", opacity: newName.trim() ? 1 : 0.4}}>
                Criar perfil
              </button>
            </div>
          </div>
        ) : (
          <button onClick={() => setAdding(true)}
            className="w-full flex items-center gap-4 p-4 rounded-2xl text-left"
            style={{background: card, border: `2px dashed ${bdr}`}}>
            <div className="w-12 h-12 rounded-full flex items-center justify-center text-2xl shrink-0"
              style={{background: bg, border: `2px dashed ${bdr}`, color: sub}}>+</div>
            <div className="text-sm" style={{color: sub}}>Adicionar perfil</div>
          </button>
        )}
      </div>

      {onClose && (
        <div className="px-6 py-5 border-t" style={{borderColor: bdr}}>
          <button onClick={onClose}
            className="w-full py-3 rounded-2xl text-sm font-semibold"
            style={{background: card, border: `1px solid ${bdr}`, color: sub}}>
            Voltar
          </button>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// ROOT: gerencia perfis e monta o App correto
// ─────────────────────────────────────────────

function AppRoot() {
  migrateIfNeeded();

  const [profiles, setProfiles] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(JST_PROFILES_KEY)) || []; }
    catch { return []; }
  });
  const [activeId, setActiveId] = React.useState(
    () => localStorage.getItem(JST_ACTIVE_KEY) || ""
  );
  const [showSelector, setShowSelector] = React.useState(true);

  function selectProfile(pid) {
    localStorage.setItem(JST_ACTIVE_KEY, pid);
    setActiveId(pid);
    setShowSelector(false);
  }

  function addProfile(profile) {
    const updated = [...profiles, profile];
    setProfiles(updated);
    localStorage.setItem(JST_PROFILES_KEY, JSON.stringify(updated));
    selectProfile(profile.id);
  }

  function deleteProfile(pid) {
    // Apaga todas as chaves do perfil no localStorage
    const prefix = `jst_p_${pid}_`;
    const toDelete = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) toDelete.push(k);
    }
    toDelete.forEach(k => localStorage.removeItem(k));

    const updated = profiles.filter(p => p.id !== pid);
    setProfiles(updated);
    localStorage.setItem(JST_PROFILES_KEY, JSON.stringify(updated));

    // Se era o perfil ativo, muda para o primeiro restante
    if (pid === activeId && updated.length > 0) {
      localStorage.setItem(JST_ACTIVE_KEY, updated[0].id);
      setActiveId(updated[0].id);
    }
  }

  const activeProfile = profiles.find(p => p.id === activeId);

  if (showSelector || !activeProfile) {
    return (
      <ProfileSelector
        profiles={profiles}
        activeId={activeId}
        onSelect={selectProfile}
        onAddProfile={addProfile}
        onDeleteProfile={deleteProfile}
        onClose={activeProfile ? () => setShowSelector(false) : null}
      />
    );
  }

  return (
    <App
      key={activeId}
      profileId={activeId}
      profileName={activeProfile.name}
      profileColor={activeProfile.color}
      profiles={profiles}
      onSwitchProfile={() => setShowSelector(true)}
    />
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppRoot />);
  </script>
</body>
